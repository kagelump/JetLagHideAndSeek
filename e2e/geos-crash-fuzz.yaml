appId: com.raycatdev.hideandseek.v2
---
# GEOS Crash Fuzz — feeds degenerate WKB to native bufferWKB on-device.
#
# Prerequisites: the dev build must be compiled with
#   EXPO_PUBLIC_GEOMETRY_BACKEND=geos
# so that APP_CONFIG.geometry.backend is "geos" from app start.
#
# Flow:
# 1. Bootstrap (clear state, set location, open app)
# 2. Navigate to Settings → Run GEOS Parity Harness
# 3. Tap Run Crash Fuzz
# 4. Assert CRASH FUZZ PASS
- clearState
- runFlow: bootstrap.yaml
# Open the sheet
- swipe:
      start: "50%,85%"
      end: "50%,45%"
      duration: 500
# ── Navigate to Settings → Parity Harness ────────────────────────────
- tapOn: "Settings"
- waitForAnimationToEnd:
      timeout: 1000
# Scroll down to find the dev-only parity harness row.
- swipe:
      start: "50%,70%"
      end: "50%,30%"
      duration: 300
- tapOn: "Run GEOS Parity Harness"
- waitForAnimationToEnd:
      timeout: 1000
# ── Run crash fuzz ───────────────────────────────────────────────────
- tapOn: "Run Crash Fuzz"
# 1k iterations × 7 cases — completes in ~seconds.
- extendedWaitUntil:
      visible: "CRASH FUZZ"
      timeout: 30000
# ── Assert CRASH FUZZ PASS ───────────────────────────────────────────
- assertVisible: "CRASH FUZZ PASS"
# Take a screenshot artifact for the CI log.
- takeScreenshot: e2e/artifacts/geos/geos-crash-fuzz
