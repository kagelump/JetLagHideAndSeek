appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: ${MAESTRO_DEV_CLIENT_URL}
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- runFlow:
      when:
          visible: "Continue"
      commands:
          - tapOn: "Continue"
          - extendedWaitUntil:
                visible: "Connected to:"
                timeout: 10000
          - tapOn:
                point: "91%,48%"
- extendedWaitUntil:
      id: "main-settings-row"
      timeout: 240000
- runFlow:
      when:
          visible: "Open bottom sheet"
      commands:
          - tapOn: "Open bottom sheet"
- swipe:
      start: "50%,85%"
      end: "50%,45%"
      duration: 500
- tapOn:
      id: "main-settings-row"
- extendedWaitUntil:
      id: "settings-share-button"
      timeout: 10000
- swipe:
      start: "2%,75%"
      end: "80%,75%"
      duration: 500
- extendedWaitUntil:
      id: "main-settings-row"
      timeout: 10000
- assertVisible:
      id: "main-settings-row"
