appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: ${MAESTRO_DEV_CLIENT_URL}
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- runFlow:
      when:
          visible: "Continue"
      commands:
          - tapOn: "Continue"
          - extendedWaitUntil:
                visible: "Connected to:"
                timeout: 10000
          - tapOn:
                point: "91%,48%"
# iOS: gorhom bottom sheet blocks XCUITest; use coordinate taps
- runFlow:
      when:
          platform: ios
      commands:
          - waitForAnimationToEnd:
                timeout: 240000
          - swipe:
                start: "50%,85%"
                end: "50%,45%"
                duration: 500
          - tapOn:
                point: "50%,60%"
          - takeScreenshot: e2e/artifacts/smoke/smoke-ios-settings
          - swipe:
                start: "2%,75%"
                end: "80%,75%"
                duration: 500
- runFlow:
      when:
          platform: android
      commands:
          - extendedWaitUntil:
                visible:
                    id: "main-settings-row"
                timeout: 240000
          - swipe:
                start: "50%,85%"
                end: "50%,45%"
                duration: 500
          - tapOn:
                id: "main-settings-row"
          - extendedWaitUntil:
                visible:
                    id: "settings-share-button"
                timeout: 10000
          - swipe:
                start: "2%,75%"
                end: "80%,75%"
                duration: 500
          - extendedWaitUntil:
                visible:
                    id: "main-questions-row"
                timeout: 10000
- assertVisible:
      id: "main-settings-row"
