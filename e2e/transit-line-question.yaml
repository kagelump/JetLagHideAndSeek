appId: com.raycatdev.hideandseek.v2
---
- clearState
- runFlow: bootstrap.yaml
- runFlow: expand-sheet.yaml
- runFlow: dismiss-continue.yaml
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 15000
- tapOn: "Settings"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Open Hiding Zones settings"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Tokyo Metro, Add"
- waitForAnimationToEnd:
      timeout: 1000
- extendedWaitUntil:
      visible: ".*1 preset selected.*"
      timeout: 15000
- stopApp
- runFlow: reconnect.yaml
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 15000
- runFlow: expand-sheet.yaml
- runFlow: dismiss-continue.yaml
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 15000
- tapOn: "Questions"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Add question"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Open matching questions"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn:
      id: "add-matching-transit-line-row"
- waitForAnimationToEnd:
      timeout: 1000
- extendedWaitUntil:
      visible:
          id: "matching-answer-option-positive"
      timeout: 30000
- tapOn:
      id: "matching-answer-option-positive"
- waitForAnimationToEnd:
      timeout: 1000
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 15000
- takeScreenshot: e2e/artifacts/transit-line-question/transit-line-hit-map
