appId: com.raycatdev.hideandseek.v2
---
- clearState
- openLink: ${MAESTRO_DEV_CLIENT_URL}
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- runFlow:
      when:
          visible: "Continue"
      commands:
          - tapOn: "Continue"
          - extendedWaitUntil:
                visible: "Connected to:"
                timeout: 10000
          - tapOn:
                point: "91%,48%"
- extendedWaitUntil:
      id: "main-settings-row"
      timeout: 240000
- runFlow:
      when:
          visible: "Open bottom sheet"
      commands:
          - tapOn: "Open bottom sheet"
- swipe:
      start: "50%,85%"
      end: "50%,45%"
      duration: 500
- tapOn:
      id: "main-settings-row"
- extendedWaitUntil:
      id: "settings-share-button"
      timeout: 10000
- tapOn:
      id: "settings-hiding-zone-row"
- extendedWaitUntil:
      id: "hiding-zone-preset-tokyo-metro"
      timeout: 10000
- tapOn:
      id: "hiding-zone-preset-tokyo-metro"
- tapOn: "Back"
- extendedWaitUntil:
      id: "settings-share-button"
      timeout: 10000
- tapOn: "Back"
- extendedWaitUntil:
      id: "main-settings-row"
      timeout: 10000
- tapOn:
      id: "main-questions-row"
- extendedWaitUntil:
      id: "questions-add-question-row"
      timeout: 10000
- tapOn:
      id: "questions-add-question-row"
- extendedWaitUntil:
      id: "add-matching-question-row"
      timeout: 10000
- tapOn:
      id: "add-matching-question-row"
- extendedWaitUntil:
      id: "matching-answer-option-unanswered"
      timeout: 10000
- assertVisible:
      id: "matching-answer-option-unanswered"
- assertVisible:
      id: "matching-answer-option-positive"
- assertVisible:
      id: "matching-answer-option-negative"
- assertVisible:
      id: "transit-line-option-2"
- tapOn:
      id: "transit-line-option-2"
- tapOn:
      id: "matching-answer-option-positive"
- takeScreenshot: e2e/artifacts/transit-line-question/transit-line-hit-map
- tapOn: "Back"
- extendedWaitUntil:
      id: "questions-add-question-row"
      timeout: 10000
- assertVisible: "Open matching question 1"
