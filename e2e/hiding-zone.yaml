appId: com.raycatdev.hideandseek.v2
---
- clearState
- runFlow: bootstrap.yaml
- runFlow: expand-sheet.yaml
- tapOn: "Settings"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Open Hiding Zones settings"
- waitForAnimationToEnd:
      timeout: 1000
- assertVisible: ".*0 presets selected.*"
- assertVisible: ".*0 stations.*"
- tapOn: "Tokyo Metro, Add"
- extendedWaitUntil:
      visible: ".*1 preset selected.*"
      timeout: 30000
- extendedWaitUntil:
      visible: ".*185 stations.*"
      timeout: 15000
- tapOn: "Toei Subway, Add"
- extendedWaitUntil:
      visible: ".*2 presets selected.*"
      timeout: 30000
- tapOn: "Hiding zone radius"
- eraseText
- inputText: "500"
- pressKey: back
- tapOn: "Station radius"
- extendedWaitUntil:
      visible: ".*Stored as 500 m"
      timeout: 30000
- tapOn: "Tokyo Metro, Remove"
- extendedWaitUntil:
      visible: ".*1 preset selected.*"
      timeout: 30000
- swipe:
      start: "50%,15%"
      end: "50%,85%"
      duration: 500
- takeScreenshot: e2e/artifacts/hiding-zone/hiding-zone-map
