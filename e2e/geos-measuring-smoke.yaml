appId: com.raycatdev.hideandseek.v2
---
# GEOS Measuring Smoke — exercises the GEOS native buffer path on-device.
#
# Prerequisites: the dev build must be compiled with
#   EXPO_PUBLIC_GEOMETRY_BACKEND=geos
# so that APP_CONFIG.geometry.backend is "geos" from app start.
#
# Flow:
# 1. Bootstrap (clear state, set location, open app)
# 2. Add an admin-1st-border measuring question, toggle answer
# 3. Add a body-of-water measuring question, toggle answer
# 4. Run the on-device parity harness, assert PARITY PASS
- clearState
- runFlow: bootstrap.yaml
# Open the sheet
- swipe:
      start: "50%,85%"
      end: "50%,45%"
      duration: 500
# ── Navigate to Add Question ──────────────────────────────────────────
- tapOn: "Questions"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Add question"
- waitForAnimationToEnd:
      timeout: 1000
# ── Add admin-1st-border (Prefecture Border) ──────────────────────────
- tapOn: "Add measuring question"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Prefecture Border measuring category"
- waitForAnimationToEnd:
      timeout: 1000
# Wait for the distance computation to finish (coord summary visible).
- extendedWaitUntil:
      notVisible: "Computing..."
      timeout: 30000
# Toggle answer to Closer.
- tapOn: "Closer answer"
- waitForAnimationToEnd:
      timeout: 1000
# Assert the app is still responsive (coordinate summary visible).
- assertVisible:
      text: ".*km"
      optional: true
# ── Go back to Questions, add body-of-water ───────────────────────────
- tapOn: "Back"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Add question"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Add measuring question"
- waitForAnimationToEnd:
      timeout: 1000
# Scroll down in the category modal to reach "Body of Water".
- swipe:
      start: "50%,70%"
      end: "50%,30%"
      duration: 300
- tapOn: "Body of Water measuring category"
- waitForAnimationToEnd:
      timeout: 1000
# Wait for the body-of-water distance computation.
- extendedWaitUntil:
      notVisible: "Computing..."
      timeout: 60000
# Toggle answer to Farther.
- tapOn: "Farther answer"
- waitForAnimationToEnd:
      timeout: 1000
# ── Navigate to Settings → Parity Harness ────────────────────────────
- tapOn: "Back"
- waitForAnimationToEnd:
      timeout: 1000
- tapOn: "Back"
- waitForAnimationToEnd:
      timeout: 1000
- swipe:
      start: "50%,85%"
      end: "50%,45%"
      duration: 500
- tapOn: "Settings"
- waitForAnimationToEnd:
      timeout: 1000
# Scroll down in Settings to find the dev-only parity harness row.
- swipe:
      start: "50%,70%"
      end: "50%,30%"
      duration: 300
- tapOn: "Run GEOS Parity Harness"
- waitForAnimationToEnd:
      timeout: 1000
# ── Run the parity harness ────────────────────────────────────────────
- tapOn: "Run Parity Harness"
# The JS oracle takes ~5–8 minutes for 46 parity cases.
- extendedWaitUntil:
      visible: "PARITY"
      timeout: 600000
# ── Assert PARITY PASS ───────────────────────────────────────────────
- assertVisible: "PARITY PASS"
# Take a screenshot artifact for the CI log.
- takeScreenshot: e2e/artifacts/geos/geos-measuring-smoke
