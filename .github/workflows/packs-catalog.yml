name: Packs Catalog Check

# Validates catalog.json on gh-pages branch after every push.
# Verifies:
#   - catalog.json matches the v2 schema
#   - Every artifact URL returns HTTP 200 (HEAD request)

on:
    push:
        branches:
            - gh-pages
        paths:
            - "catalog.json"
    workflow_dispatch:

jobs:
    validate:
        name: Validate catalog
        runs-on: ubuntu-latest
        steps:
            # Checkout default branch to get the validator script.
            - uses: actions/checkout@v4
              with:
                  path: repo

            # Checkout gh-pages branch to get catalog.json.
            - uses: actions/checkout@v4
              with:
                  ref: gh-pages
                  path: pages

            - uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Validate catalog schema
              working-directory: pages
              run: |
                  node --input-type=module -e "
                  import { readFileSync } from 'node:fs';
                  import { validateCatalog } from '../repo/data/packs/scripts/lib/catalogSchema.mjs';

                  const catalog = JSON.parse(readFileSync('catalog.json', 'utf8'));
                  const errors = validateCatalog(catalog);
                  if (errors.length > 0) {
                      console.error('Catalog validation FAILED:');
                      errors.forEach(e => console.error('  ' + e));
                      process.exit(1);
                  }
                  console.log('Catalog schema: OK (' + catalog.packs.length + ' packs, ' +
                      catalog.packs.reduce((s, p) => s + p.artifacts.length, 0) + ' artifacts)');
                  "

            - name: Verify artifact URLs (HEAD)
              working-directory: pages
              run: |
                  node --input-type=module -e "
                  import { validateCatalog } from '../repo/data/packs/scripts/lib/catalogSchema.mjs';
                  import { readFileSync } from 'node:fs';

                  const catalog = JSON.parse(readFileSync('catalog.json', 'utf8'));

                  // Collect all artifact URLs.
                  const urls = [];
                  for (const pack of catalog.packs) {
                      for (const art of pack.artifacts) {
                          if (art.url) urls.push(art.url);
                      }
                  }

                  if (urls.length === 0) {
                      console.log('No artifact URLs to check.');
                      process.exit(0);
                  }

                  let failures = 0;
                  let checks = 0;

                  async function checkUrl(url) {
                      try {
                          const controller = new AbortController();
                          const timeout = setTimeout(() => controller.abort(), 10000);
                          const resp = await fetch(url, {
                              method: 'HEAD',
                              signal: controller.signal,
                          });
                          clearTimeout(timeout);
                          if (resp.ok) {
                              console.log('  OK ' + resp.status + ' ' + url);
                          } else {
                              console.log('  FAIL ' + resp.status + ' ' + url);
                              failures++;
                          }
                      } catch (err) {
                          console.log('  ERROR ' + err.message + ' ' + url);
                          failures++;
                      }
                      checks++;
                  }

                  for (const url of urls) {
                      await checkUrl(url);
                  }
                  console.log('Checked ' + checks + ' URLs, ' + failures + ' failures.');
                  if (failures > 0) process.exit(1);
                  "

            - name: Summary
              run: |
                  echo "Catalog check passed."
