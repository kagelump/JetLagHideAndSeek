name: Mobile v2 Checks

on:
    pull_request:
        paths:
            - "mobile_v2/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - ".prettierrc"
            - ".editorconfig"
            - ".github/workflows/mobile-v2-checks.yml"
    push:
        branches:
            - production
            - beta
        paths:
            - "mobile_v2/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - ".prettierrc"
            - ".editorconfig"
            - ".github/workflows/mobile-v2-checks.yml"

jobs:
    check:
        name: Lint, format, and typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check mobile_v2
              run: pnpm --dir mobile_v2 check

            - name: Test mobile_v2
              run: pnpm --dir mobile_v2 test
