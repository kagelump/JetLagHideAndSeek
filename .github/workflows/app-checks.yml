name: App Checks

on:
    pull_request:
        paths:
            - "app/**"
            - "assets/**"
            - "data/**"
            - "docs/**"
            - "e2e/**"
            - "scripts/**"
            - "site/**"
            - "src/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - "app.json"
            - "app.config.ts"
            - "babel.config.js"
            - "eslint.config.js"
            - "jest.config.js"
            - "jest.setup.ts"
            - "metro.config.js"
            - "tsconfig.json"
            - ".prettierrc"
            - ".editorconfig"
            - ".github/workflows/*.yml"
    push:
        branches:
            - master
        paths:
            - "app/**"
            - "assets/**"
            - "data/**"
            - "docs/**"
            - "e2e/**"
            - "scripts/**"
            - "site/**"
            - "src/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - "app.json"
            - "app.config.ts"
            - "babel.config.js"
            - "eslint.config.js"
            - "jest.config.js"
            - "jest.setup.ts"
            - "metro.config.js"
            - "tsconfig.json"
            - ".prettierrc"
            - ".editorconfig"
            - ".github/workflows/*.yml"

jobs:
    check:
        name: Lint, format, and typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check
              run: pnpm check

            - name: Test
              run: pnpm test

            # GEOS host parity (geos-wasm) — excluded from `pnpm test` because it
            # needs --experimental-vm-modules. Runs each suite in its own process
            # (see scripts/run-geos-tests.mjs) and asserts the committed golden
            # fixtures, so a GEOS/backend change that drifts from the oracle fails
            # here before reaching a device.
            - name: GEOS parity
              run: pnpm test:geos
