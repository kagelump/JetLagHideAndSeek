name: Share Link Pages

# Deploys the static site for jetlag.hinoka.org via GitHub Actions.
# This is the single Pages deploy path — it atomically serves:
#   1. Splash/home page (site/index.html, privacy.html, assets)
#   2. App deep linking (site/.well-known/, site/i/)
#   3. Bundle viewer (site/bundle-viewer/)
#   4. Packs catalog (site/packs/catalog.json, NOTICE, index.html)
# GitHub Pages must be enabled with GitHub Actions as the source.

on:
    push:
        branches:
            - master
        paths:
            - "site/**"
            - "scripts/build-share-site-config.mjs"
            - "tools/data-viewer/**"
            - "assets/measuring/**"
            - "assets/poi/**"
            - "assets/default-zones/**"
            - "data/packs/scripts/lib/catalogSchema.mjs"
            - ".github/workflows/pages.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Build verification files
              env:
                  APP_LINK_DOMAIN: ${{ vars.APP_LINK_DOMAIN }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  ANDROID_SHA256_CERT_FINGERPRINTS: ${{ secrets.ANDROID_SHA256_CERT_FINGERPRINTS }}
              run: node scripts/build-share-site-config.mjs

            - name: Build bundle viewer
              run: node tools/data-viewer/build.mjs

            - name: Validate packs catalog (if present)
              if: hashFiles('site/packs/catalog.json') != ''
              run: |
                  node --input-type=module -e "
                  import { readFileSync } from 'node:fs';
                  import { validateCatalog } from './data/packs/scripts/lib/catalogSchema.mjs';

                  const catalog = JSON.parse(readFileSync('site/packs/catalog.json', 'utf8'));
                  const errors = validateCatalog(catalog);
                  if (errors.length > 0) {
                      console.error('Catalog validation FAILED:');
                      errors.forEach(e => console.error('  ' + e));
                      process.exit(1);
                  }
                  const totalArtifacts = catalog.packs.reduce((s, p) => s + p.artifacts.length, 0);
                  console.log('Catalog schema: OK (' + catalog.packs.length + ' packs, ' +
                      totalArtifacts + ' artifacts)');
                  "

            - uses: actions/configure-pages@v5
              with:
                  enablement: true

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: site

            - id: deployment
              uses: actions/deploy-pages@v4
