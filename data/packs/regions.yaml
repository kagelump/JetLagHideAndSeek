# Offline data pack region definitions.
# One entry per Geofabrik region.  id must match /^[a-z0-9][a-z0-9-]*$/.

regions:
    - id: europe-netherlands
      label: Netherlands
      regionPath: [Europe, Netherlands]
      pbfUrl: https://download.geofabrik.de/europe/netherlands-latest.osm.pbf
      adminLevels:
          matching: [4, 8, 9, 10] # admin-1st..4th (level 7 has zero relations in NL)
          extract: [4, 7, 8, 9, 10] # superset
      artifacts: [poi, measuring, boundaries, transit]
      transitOverrides:
          nameSuffixes: []
          maxClusterMeters: 150
          routeColors: {}
    - id: asia-taiwan
      label: Taiwan
      regionPath: [Asia, Taiwan]
      pbfUrl: https://download.geofabrik.de/asia/taiwan-latest.osm.pbf
      adminLevels:
          matching: [4, 7, 8, 9] # admin-1st..4th (level 10 has only 3 relations)
          extract: [4, 7, 8, 9, 10]
      artifacts: [poi, measuring, boundaries, transit]
      transitOverrides:
          nameSuffixes: ["站", "車站"]
          maxClusterMeters: 150
          excludeUsage: [tourism]
          useRailwayInfrastructure: true
          railwayAttachMeters: 120
          routeColors:
              "縱貫線": "#0033A0"
              "海岸線": "#0070BD"
              "北迴線": "#E4002B"
              "宜蘭線": "#00843D"
              "臺東線": "#F58B1F"
              "南迴線": "#C48C31"
              "屏東線": "#7B4F9D"
              "集集線": "#8B5E3C"
              "內灣線": "#2E8B57"
              "臺中線": "#1F9E8B"
              "成追線": "#9E1F7A"
              "台灣高速鐵路": "#FF0000"
              "臺灣高速鐵路": "#FF0000"
          operatorNames:
              # TRA: merge the 2024 corporate-rename + old-bureau variants so
              # route=railway lines (tagged 臺灣鐵路公司) attach to the main
              # 國營臺灣鐵路股份有限公司 station preset instead of landing in
              # the "Other stations" coverage preset.
              國營臺灣鐵路股份有限公司:
                  ["臺灣鐵路公司", "臺灣鐵路管理局", "台灣鐵路管理局"]
              # MRT/LRT operators that appear under duplicate name variants.
              高雄捷運股份有限公司: ["高雄捷運公司"]
              新北大眾捷運股份有限公司: ["新北捷運公司", "新北捷運股份有限公司"]
              臺中捷運: ["臺中捷運公司", "臺中捷運股份有限公司"]
          # curatedRoutes: {} # T17 — bus/cable-car line modes
    # ─── Top global regions batch 1 ───────────────────────────────────────────────
    # Body-of-water is disabled for this batch because the NL build showed the
    # polygon dissolve can hit a GEOS TopologyException and hard-lock on the
    # polyclip-ts fallback. POI, boundaries, coastline, high-speed-rail and
    # transit are still produced.
