# Transit station pipeline configuration.
# See docs/tasks/transit-expansion/design.md for the full architecture.

outputDir: ../../assets/transit
cacheDir: cache
notice: NOTICE.md

locales:
    - id: japan
      nameSuffixes: ["駅"]
      maxClusterMeters: 150
      aliases: []

      osm:
          regions:
              - id: japan-kanto
                bbox: [138.4, 34.8, 140.9, 37.1]
                pbf: "https://download.geofabrik.de/asia/japan/kanto-latest.osm.pbf"
              - id: japan-kansai
                bbox: [134.5, 33.5, 136.5, 35.8]
                pbf: "https://download.geofabrik.de/asia/japan/kansai-latest.osm.pbf"
              - id: japan-chubu
                bbox: [136.2, 34.6, 138.6, 37.8]
                pbf: "https://download.geofabrik.de/asia/japan/chubu-latest.osm.pbf"
              - id: japan-tohoku
                bbox: [139.5, 36.9, 142.0, 41.6]
                pbf: "https://download.geofabrik.de/asia/japan/tohoku-latest.osm.pbf"
              - id: japan-chugoku
                bbox: [130.7, 33.3, 134.5, 36.0]
                pbf: "https://download.geofabrik.de/asia/japan/chugoku-latest.osm.pbf"
              - id: japan-kyushu
                bbox: [129.3, 30.9, 132.5, 34.2]
                pbf: "https://download.geofabrik.de/asia/japan/kyushu-latest.osm.pbf"
              - id: japan-shikoku
                bbox: [131.9, 32.5, 134.8, 34.5]
                pbf: "https://download.geofabrik.de/asia/japan/shikoku-latest.osm.pbf"
              - id: japan-hokkaido
                bbox: [139.5, 41.3, 146.0, 45.7]
                pbf: "https://download.geofabrik.de/asia/japan/hokkaido-latest.osm.pbf"
          stationTags: ["n/railway=station", "n/railway=halt"]
          routeTypes: [train, subway, light_rail, monorail]

      gtfs:
          - id: tokyo-metro
            label: Tokyo Metro
            namespace: odpt-tokyo-metro # preserved — keeps persisted lineIds valid
            url: "https://api.odpt.org/api/v4/files/TokyoMetro/data/TokyoMetro-Train-GTFS.zip?acl:consumerKey=${ODPT_KEY}"
            requiresKey: true
            lineGrouping: route_id # ODPT is already line-granular
            routeTypes: [0, 1, 2]
            defaultColor: "#009BBF"
            license: "ODPT terms — see NOTICE"
          - id: toei-subway
            label: Toei Subway
            namespace: odpt-toei-subway
            url: "https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip"
            requiresKey: false
            lineGrouping: route_id
            routeTypes: [0, 1, 2]
            defaultColor: "#6CBB5A"
            license: "ODPT terms — see NOTICE"

      networkNames:
          "山手線": "JR East"
          "JR東日本": "JR East"
          "京浜東北線": "JR East"

      operators:
          - match:
                {
                    gtfsNamespace: odpt-tokyo-metro,
                    osmOperator: ["東京メトロ", "Tokyo Metro"],
                }
            routeSource: gtfs
          - match:
                {
                    gtfsNamespace: odpt-toei-subway,
                    osmOperator: ["東京都交通局", "Toei"],
                }
            routeSource: gtfs

      operatorNames:
          "JR East":
              - "東日本旅客鉄道"
              - "JR東日本"
              - "東日本旅客鉄道株式会社"
              - "JR東日本旅客鉄道"
              - "東日本旅客鉄道 (JR East)"
              - "JR East"
          "Tokyu Railways":
              - "東京急行電鉄"
              - "東急電鉄"
              - "Tokyu Corporation"
              - "Tokyu Railways"
          "Keikyu":
              - "京浜急行電鉄"
              - "京浜急行電鉄 (Keikyu Corporation)"
              - "Keikyu Corporation"
          "Keio":
              - "京王電鉄"
              - "Keio Corporation"
          "Seibu":
              - "西武鉄道"
          "Keisei":
              - "京成電鉄"
          "Odakyu":
              - "小田急電鉄"
          "Tobu":
              - "東武鉄道"
          "Tokyo Metro":
              - "東京地下鉄"
              - "Tokyo Metro"
          "Toei":
              - "東京都交通局"
              - "Toei"
          "Yokohama Municipal Subway":
              - "横浜市交通局"
          "Sotetsu":
              - "相模鉄道"
          "Hankyu":
              - "阪急電鉄"
          "Hanshin":
              - "阪神電気鉄道"
          "Kintetsu":
              - "近畿日本鉄道"
              - "近鉄"
          "Nankai":
              - "南海電気鉄道"
          "Keihan":
              - "京阪電気鉄道"
          "Meitetsu":
              - "名古屋鉄道"
          "JR Central":
              - "東海旅客鉄道"
              - "JR東海"
          "JR West":
              - "西日本旅客鉄道"
              - "JR西日本"
