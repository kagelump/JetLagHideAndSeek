# Transit station pipeline configuration.
# See docs/tasks/transit-expansion/design.md for the full architecture.

outputDir: ../../assets/transit
cacheDir: cache
notice: NOTICE.md

locales:
    - id: japan
      nameSuffixes: ["駅"]
      maxClusterMeters: 150
      aliases: []

      osm:
          # Region bboxes for preset assignment (T3).  OSM extraction
          # (station nodes, route relations) is added in T5.
          regions:
              - id: japan-kanto
                bbox: [138.4, 34.8, 140.9, 37.1]
              - id: japan-kansai
                bbox: [134.5, 33.5, 136.5, 35.8]
              - id: japan-chubu
                bbox: [136.2, 34.6, 138.6, 37.8]
              - id: japan-tohoku
                bbox: [139.5, 36.9, 142.0, 41.6]
              - id: japan-chugoku
                bbox: [130.7, 33.3, 134.5, 36.0]
              - id: japan-kyushu
                bbox: [129.3, 30.9, 132.5, 34.2]
              - id: japan-shikoku
                bbox: [131.9, 32.5, 134.8, 34.5]
              - id: japan-hokkaido
                bbox: [139.5, 41.3, 146.0, 45.7]

      gtfs:
          - id: tokyo-metro
            label: Tokyo Metro
            namespace: odpt-tokyo-metro # preserved — keeps persisted lineIds valid
            url: "https://api.odpt.org/api/v4/files/TokyoMetro/data/TokyoMetro-Train-GTFS.zip?acl:consumerKey=${ODPT_KEY}"
            requiresKey: true
            lineGrouping: route_id # ODPT is already line-granular
            routeTypes: [0, 1, 2]
            defaultColor: "#009BBF"
            license: "ODPT terms — see NOTICE"
          - id: toei-subway
            label: Toei Subway
            namespace: odpt-toei-subway
            url: "https://api-public.odpt.org/api/v4/files/Toei/data/Toei-Train-GTFS.zip"
            requiresKey: false
            lineGrouping: route_id
            routeTypes: [0, 1, 2]
            defaultColor: "#6CBB5A"
            license: "ODPT terms — see NOTICE"

      operators:
          - match:
                {
                    gtfsNamespace: odpt-tokyo-metro,
                    osmOperator: ["東京メトロ", "Tokyo Metro"],
                }
            routeSource: gtfs
          - match:
                {
                    gtfsNamespace: odpt-toei-subway,
                    osmOperator: ["東京都交通局", "Toei"],
                }
            routeSource: gtfs
