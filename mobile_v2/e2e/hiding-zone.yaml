appId: com.hinoka.hideandseek.v2
---
- launchApp
- runFlow:
      when:
          visible: "Open"
      commands:
          - tapOn: "Open"
- runFlow:
      when:
          visible: "Continue"
      commands:
          - tapOn: "Continue"
- extendedWaitUntil:
      visible: "Tokyo 23 Wards"
      timeout: 60000
- tapOn:
      id: "main-settings-row"
- tapOn:
      id: "settings-hiding-zone-row"
- waitForAnimationToEnd
- assertVisible: "Hiding zone settings; radius 600 m; stored as 600 m; 0 presets selected; 0 stations"
- tapOn:
      point: "50%,69%"
- assertVisible: "Hiding zone settings; radius 600 m; stored as 600 m; 1 preset selected; 185 stations"
- tapOn:
      point: "74%,40%"
- assertVisible: "Hiding zone settings; radius 0.60 km; stored as 600 m; 1 preset selected; 185 stations"
- tapOn:
      point: "31%,40%"
- eraseText
- inputText: "1"
- assertVisible: "Hiding zone settings; radius 1 km; stored as 1000 m; 1 preset selected; 185 stations"
