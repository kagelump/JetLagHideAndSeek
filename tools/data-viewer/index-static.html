<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bundle Viewer — JetLag Hide &amp; Seek</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
        />
        <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
        <script src="lib/columnarToGeojson.js"></script>
        <script src="lib/sniffKind.js"></script>
        <script src="lib/deltaEncode.js"></script>
        <script src="lib/transitGeojson.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
            }
            #map {
                width: 100vw;
                height: 100vh;
            }
            #loading {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.7);
                color: #fff;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 10;
                pointer-events: none;
                transition: opacity 0.3s;
            }
            #loading.hidden {
                opacity: 0;
            }
            #legend {
                position: fixed;
                top: 10px;
                right: 10px;
                background: rgba(255, 255, 255, 0.92);
                border-radius: 8px;
                padding: 10px 14px;
                font-size: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
                z-index: 5;
                line-height: 1.8;
                max-height: calc(100vh - 20px);
                overflow-y: auto;
                min-width: 180px;
            }
            .legend-swatch {
                display: inline-block;
                width: 20px;
                height: 3px;
                vertical-align: middle;
                margin-right: 6px;
                border-radius: 2px;
            }
            .legend-swatch.polygon {
                height: 12px;
                width: 12px;
                border-radius: 2px;
            }
            #catalog-section {
                margin-bottom: 8px;
            }
            #catalog-section summary {
                cursor: pointer;
                font-weight: 600;
                font-size: 11px;
            }
            #catalog-list {
                font-size: 11px;
                margin-top: 4px;
                max-height: 200px;
                overflow-y: auto;
            }
            .catalog-pack {
                padding: 3px 0;
                border-bottom: 1px solid #f0f0f0;
                cursor: pointer;
            }
            .catalog-pack:hover {
                background: #f5f5f5;
            }
            .catalog-artifact {
                font-size: 10px;
                color: #666;
                padding-left: 10px;
                cursor: pointer;
            }
            .catalog-artifact:hover {
                color: #2563eb;
                text-decoration: underline;
            }
            #drop-zone {
                border: 2px dashed #ccc;
                border-radius: 6px;
                padding: 8px;
                text-align: center;
                font-size: 11px;
                color: #888;
                margin: 4px 0;
                cursor: pointer;
                transition:
                    border-color 0.2s,
                    background 0.2s;
            }
            #drop-zone.dragover {
                border-color: #2563eb;
                background: rgba(37, 99, 235, 0.05);
            }
            #toast {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: #fff;
                padding: 8px 20px;
                border-radius: 6px;
                font-size: 13px;
                z-index: 100;
                opacity: 0;
                transition: opacity 0.2s;
                pointer-events: none;
            }
            #toast.visible {
                opacity: 1;
            }
            #pack-meta-info {
                font-size: 10px;
                color: #666;
                margin-bottom: 4px;
                word-break: break-all;
            }
            #provenance-panel {
                font-size: 10px;
                color: #555;
                background: #f9f9f9;
                border-radius: 4px;
                padding: 4px 6px;
                margin: 4px 0;
                display: none;
            }
            .payload-category {
                font-weight: 600;
                margin-top: 4px;
                margin-bottom: 2px;
                font-size: 11px;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <div id="loading">Loading layers…</div>
        <div id="toast"></div>
        <div id="legend">
            <div style="font-weight: 600; margin-bottom: 2px">
                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        cursor: pointer;
                    "
                >
                    <input type="checkbox" id="toggle-lines-polygons" checked />
                    Default zone
                </label>
            </div>
            <div>
                <span
                    class="legend-swatch"
                    style="background: #16a34a; height: 2px"
                ></span
                >Tokyo 23 Wards (placeholder)
            </div>
            <hr
                style="
                    border: none;
                    border-top: 1px solid #e5e7eb;
                    margin: 4px 0;
                "
            />
            <details id="catalog-section">
                <summary>Pack Catalog</summary>
                <div id="catalog-list">Loading catalog...</div>
            </details>
            <div id="drop-zone">Drop an artifact (.json.gz or .json) here</div>
            <div id="pack-meta-info"></div>
            <div id="provenance-panel"></div>
            <div id="pack-layers-container" style="margin-top: 2px"></div>
        </div>
        <script>
            // ── URL state ─────────────────────────────────────────────
            function readUrlState() {
                var p = new URLSearchParams(window.location.search);
                var hidden = (p.get("hide") || "").split(",").filter(Boolean);
                var lng = parseFloat(p.get("lng"));
                var lat = parseFloat(p.get("lat"));
                var zoom = parseFloat(p.get("zoom"));
                var vp = null;
                if (isFinite(lng) && isFinite(lat) && isFinite(zoom)) {
                    vp = { lng: lng, lat: lat, zoom: zoom };
                }
                return { hidden: hidden, viewport: vp };
            }

            function writeUrlState(hidden) {
                var url = new URL(window.location);
                if (hidden && hidden.length > 0)
                    url.searchParams.set("hide", hidden.join(","));
                else url.searchParams.delete("hide");
                history.replaceState(null, "", url);
            }

            function syncUrlFromCheckboxes() {
                var hidden = [];
                var cbs = document.querySelectorAll(
                    '#legend input[type="checkbox"][data-layer-id]',
                );
                for (var i = 0; i < cbs.length; i++) {
                    if (!cbs[i].checked)
                        hidden.push(cbs[i].getAttribute("data-layer-id"));
                }
                writeUrlState(hidden);
            }

            var _viewportSyncTimer = null;
            function syncViewportToUrl() {
                var center = map.getCenter();
                var zoom = map.getZoom();
                var url = new URL(window.location);
                url.searchParams.set("lng", center.lng.toFixed(5));
                url.searchParams.set("lat", center.lat.toFixed(5));
                url.searchParams.set("zoom", zoom.toFixed(1));
                history.replaceState(null, "", url);
            }

            var KANTO_BBOX = [137.9, 33.9, 141.9, 37.9];

            var map = new maplibregl.Map({
                container: "map",
                style: {
                    version: 8,
                    sources: {
                        osm: {
                            type: "raster",
                            tiles: [
                                "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                            ],
                            tileSize: 256,
                            attribution: "© OpenStreetMap contributors",
                            maxzoom: 19,
                        },
                    },
                    layers: [{ id: "osm", type: "raster", source: "osm" }],
                },
                bounds: KANTO_BBOX,
                fitBoundsOptions: { padding: 20 },
            });

            // Only the Tokyo 23 Wards boundary placeholder remains bundled.
            // All gameplay data (POI, measuring, transit) now lives in
            // downloadable offline packs and can be inspected by dropping an
            // artifact onto the map or by using the local server with
            // --pack <distDir>.
            var SOURCES = {
                zones: "data/zones/default.json",
            };

            var CATALOG_DATA = null;
            var PACK_LOADED_LAYERS = {};

            var POI_COLORS = {
                park: "#22c55e",
                hospital: "#ef4444",
                museum: "#a855f7",
                mountain: "#78716c",
                landmark: "#f59e0b",
                library: "#3b82f6",
                "golf-course": "#15803d",
                "movie-theater": "#ec4899",
                "foreign-consulate": "#6366f1",
                "amusement-park": "#f97316",
                zoo: "#14b8a6",
                aquarium: "#06b6d4",
                "commercial-airport": "#e11d48",
                "station-name-length": "#8b5cf6",
            };

            var BOUNDARY_COLORS = {
                4: { fill: "rgba(234, 88, 12, 0.12)", line: "#ea580c" },
                7: { fill: "rgba(107, 114, 128, 0.12)", line: "#6b7280" },
                8: { fill: "rgba(59, 130, 246, 0.12)", line: "#3b82f6" },
                9: { fill: "rgba(22, 163, 74, 0.12)", line: "#16a34a" },
                10: { fill: "rgba(139, 92, 246, 0.12)", line: "#8b5cf6" },
            };

            var POPUP = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false,
                offset: 8,
                maxWidth: "240px",
            });

            var TOAST_TIMER = null;
            function showToast(msg) {
                var el = document.getElementById("toast");
                el.textContent = msg;
                el.classList.add("visible");
                if (TOAST_TIMER) clearTimeout(TOAST_TIMER);
                TOAST_TIMER = setTimeout(function () {
                    el.classList.remove("visible");
                }, 2000);
            }

            function copyNodeInfo(feature) {
                var props = feature.properties;
                var geom = feature.geometry;
                var lines = [];
                if (props.name) lines.push("Name: " + props.name);
                if (props.nameEn && props.nameEn !== props.name)
                    lines.push("Name (EN): " + props.nameEn);
                if (props.id) lines.push("ID: " + props.id);
                if (
                    geom &&
                    geom.coordinates &&
                    geom.coordinates[0] != null &&
                    geom.coordinates[1] != null
                ) {
                    lines.push(
                        "Location: " +
                            geom.coordinates[1].toFixed(5) +
                            ", " +
                            geom.coordinates[0].toFixed(5),
                    );
                }
                if (props.routeNames) lines.push("Routes: " + props.routeNames);
                if (
                    props.routeNamesEn &&
                    props.routeNamesEn !== props.routeNames
                )
                    lines.push("Routes (EN): " + props.routeNamesEn);
                if (props.operators)
                    lines.push("Operators: " + props.operators);
                if (props.wedgeCount != null)
                    lines.push("Routes: " + props.wedgeCount);
                else if (props.ringCount != null)
                    lines.push("Rings: " + props.ringCount);
                if (props.category) lines.push("Category: " + props.category);
                if (props.osmId)
                    lines.push(
                        "OSM: " + (props.osmType || "") + " " + props.osmId,
                    );
                if (props.iata) lines.push("IATA: " + props.iata);
                var text = lines.join("\n");
                navigator.clipboard.writeText(text).then(
                    function () {
                        showToast("Copied to clipboard");
                    },
                    function () {
                        showToast("Copy failed");
                    },
                );
            }

            function buildDotsFromWedges(wedgeFc) {
                var seen = {};
                var features = [];
                for (var i = 0; i < wedgeFc.features.length; i++) {
                    var f = wedgeFc.features[i];
                    var p = f.properties;
                    if (p.wedgeIndex === 0 && !seen[p.id]) {
                        seen[p.id] = true;
                        // Copy all wedge properties, drop wedgeIndex/wedgeCount
                        // and stationLon/stationLat (geometry-only fields).
                        var dotProps = {};
                        var dropKeys = {
                            wedgeIndex: true,
                            stationLon: true,
                            stationLat: true,
                        };
                        var keys = Object.keys(p);
                        for (var k = 0; k < keys.length; k++) {
                            if (!dropKeys[keys[k]]) {
                                dotProps[keys[k]] = p[keys[k]];
                            }
                        }
                        features.push({
                            type: "Feature",
                            geometry: {
                                type: "Point",
                                coordinates: [p.stationLon, p.stationLat],
                            },
                            properties: dotProps,
                        });
                    }
                }
                return { type: "FeatureCollection", features: features };
            }

            var CONFIG_LAYERS = {
                coastline: [
                    {
                        id: "coastline-line",
                        type: "line",
                        paint: { "line-color": "#2563eb", "line-width": 3 },
                    },
                ],
                "high-speed-rail": [
                    {
                        id: "hsr-line",
                        type: "line",
                        paint: { "line-color": "#dc2626", "line-width": 5 },
                    },
                ],
                "body-of-water": [
                    {
                        id: "water-fill",
                        type: "fill",
                        filter: [
                            "any",
                            ["==", ["geometry-type"], "Polygon"],
                            ["==", ["geometry-type"], "MultiPolygon"],
                        ],
                        paint: {
                            "fill-color": "#38bdf8",
                            "fill-opacity": 0.35,
                        },
                    },
                    {
                        id: "water-outline",
                        type: "line",
                        filter: [
                            "any",
                            ["==", ["geometry-type"], "Polygon"],
                            ["==", ["geometry-type"], "MultiPolygon"],
                        ],
                        paint: { "line-color": "#1d4ed8", "line-width": 1.6 },
                    },
                    {
                        id: "waterway-line",
                        type: "line",
                        filter: ["==", ["geometry-type"], "LineString"],
                        paint: { "line-color": "#059669", "line-width": 2 },
                    },
                ],
                "admin-1st-border": [
                    {
                        id: "admin1-line",
                        type: "line",
                        paint: {
                            "line-color": "#ea580c",
                            "line-width": 3,
                            "line-dasharray": [6, 3],
                        },
                    },
                ],
                "admin-2nd-border": [
                    {
                        id: "admin2-line",
                        type: "line",
                        paint: {
                            "line-color": "#6b7280",
                            "line-width": 2,
                            "line-dasharray": [4, 3],
                        },
                    },
                ],
                zones: [
                    {
                        id: "zones-fill",
                        type: "fill",
                        paint: {
                            "fill-color": "#16a34a",
                            "fill-opacity": 0.08,
                        },
                    },
                    {
                        id: "zones-outline",
                        type: "line",
                        paint: { "line-color": "#16a34a", "line-width": 2 },
                    },
                ],
            };

            async function fetchJson(url) {
                var res = await fetch(url);
                if (!res.ok) throw new Error(url + ": " + res.status);
                return res.json();
            }

            function addSource(id, data) {
                map.addSource(id, { type: "geojson", data: data });
            }

            function addLayers(id, config) {
                for (var li = 0; li < config.length; li++) {
                    var layerDef = Object.assign({}, config[li], {
                        source: id,
                    });
                    if (!map.getLayer(layerDef.id)) {
                        map.addLayer(layerDef);
                    }
                }
            }

            function removeSourceAndLayers(id) {
                if (!id || !map.getSource(id)) return;
                var layers = map.getStyle().layers || [];
                for (var li = 0; li < layers.length; li++) {
                    if (layers[li].source === id) {
                        if (map.getLayer(layers[li].id))
                            map.removeLayer(layers[li].id);
                    }
                }
                if (map.getSource(id)) map.removeSource(id);
            }

            function fitBbox(bbox) {
                if (bbox && bbox.length === 4) {
                    map.fitBounds(bbox, { padding: 40 });
                }
            }

            function clearPackLayers() {
                var keys = Object.keys(PACK_LOADED_LAYERS);
                for (var i = 0; i < keys.length; i++) {
                    removeSourceAndLayers(keys[i]);
                }
                PACK_LOADED_LAYERS = {};
            }

            // ── Built-in Japan layers ────────────────────────────────────

            async function loadLayers() {
                var entries = Object.entries(SOURCES);
                var results = await Promise.allSettled(
                    entries.map(function (e) {
                        return fetchJson(e[1]);
                    }),
                );
                var loaded = 0;
                for (var i = 0; i < entries.length; i++) {
                    var id = entries[i][0];
                    var result = results[i];
                    if (result.status === "rejected") {
                        console.error(
                            "Failed to load " + id + ":",
                            result.reason,
                        );
                        continue;
                    }
                    addSource(id, result.value);
                    addLayers(id, CONFIG_LAYERS[id]);
                    loaded++;
                }
                document.getElementById("loading").classList.add("hidden");
                console.log(
                    "Loaded " + loaded + "/" + entries.length + " layers",
                );
            }

            map.on("load", function () {
                loadLayers();
                loadCatalog();

                // Event delegation: sync URL on layer checkbox change.
                document
                    .getElementById("legend")
                    .addEventListener("change", function (e) {
                        if (
                            e.target.matches &&
                            e.target.matches(
                                'input[type="checkbox"][data-layer-id]',
                            )
                        ) {
                            syncUrlFromCheckboxes();
                        }
                    });

                // Apply viewport from URL.
                var st = readUrlState();
                if (st.viewport) {
                    map.setCenter([st.viewport.lng, st.viewport.lat]);
                    map.setZoom(st.viewport.zoom);
                }

                // Debounced viewport → URL sync.
                map.on("moveend", function () {
                    if (_viewportSyncTimer) clearTimeout(_viewportSyncTimer);
                    _viewportSyncTimer = setTimeout(syncViewportToUrl, 300);
                });

                // Apply URL hide state after any dropped layers load.
                st = readUrlState();
                if (st.hidden.length > 0) {
                    setTimeout(function () {
                        var cbs = document.querySelectorAll(
                            '#legend input[type="checkbox"][data-layer-id]',
                        );
                        for (var i = 0; i < cbs.length; i++) {
                            var id = cbs[i].getAttribute("data-layer-id");
                            if (st.hidden.indexOf(id) >= 0 && cbs[i].checked) {
                                cbs[i].checked = false;
                                cbs[i].dispatchEvent(
                                    new Event("change", { bubbles: true }),
                                );
                            }
                        }
                        syncUrlFromCheckboxes();
                    }, 500);
                }
            });

            function addStationHover(layerId) {
                map.on("mouseenter", layerId, function (e) {
                    map.getCanvas().style.cursor = "pointer";
                    var p = e.features[0].properties;
                    var html = "<strong>" + p.name + "</strong>";
                    if (p.nameEn && p.nameEn !== p.name)
                        html +=
                            '<br><span style="color:#888;font-size:12px">' +
                            p.nameEn +
                            "</span>";
                    if (p.operators) html += "<br><em>" + p.operators + "</em>";
                    if (p.routeNames)
                        html +=
                            '<br><span style="color:#666">' +
                            p.routeNames +
                            "</span>";
                    if (p.routeNamesEn && p.routeNamesEn !== p.routeNames)
                        html +=
                            '<br><span style="color:#888;font-size:12px">' +
                            p.routeNamesEn +
                            "</span>";
                    if (p.wedgeCount && p.wedgeCount > 1) {
                        html +=
                            '<br><span style="color:#999;font-size:11px">' +
                            p.wedgeCount +
                            " routes</span>";
                    }
                    POPUP.setLngLat(e.lngLat).setHTML(html).addTo(map);
                });

                map.on("mouseleave", layerId, function () {
                    map.getCanvas().style.cursor = "";
                    POPUP.remove();
                });

                map.on("click", layerId, function (e) {
                    copyNodeInfo(e.features[0]);
                });
            }

            function addDropPoiHover(layerId) {
                map.on("mouseenter", layerId, function (e) {
                    map.getCanvas().style.cursor = "pointer";
                    var p = e.features[0].properties;
                    var html =
                        "<strong>" +
                        (p.name || "(unnamed)") +
                        "</strong><br>" +
                        p.category;
                    if (p.osmId)
                        html += "<br>osm " + (p.osmType || "") + " " + p.osmId;
                    if (p.iata) html += " &middot; IATA " + p.iata;
                    POPUP.setLngLat(e.lngLat).setHTML(html).addTo(map);
                });

                map.on("mouseleave", layerId, function () {
                    map.getCanvas().style.cursor = "";
                    POPUP.remove();
                });

                map.on("click", layerId, function (e) {
                    copyNodeInfo(e.features[0]);
                });
            }

            // ── Layer toggles ─────────────────────────────────────────────
            var LINE_POLYGON_LAYERS = ["zones-fill", "zones-outline"];

            document
                .getElementById("toggle-lines-polygons")
                .addEventListener("change", function (e) {
                    var vis = e.target.checked ? "visible" : "none";
                    for (var i = 0; i < LINE_POLYGON_LAYERS.length; i++) {
                        map.setLayoutProperty(
                            LINE_POLYGON_LAYERS[i],
                            "visibility",
                            vis,
                        );
                    }
                });

            // ── Pack catalog ──────────────────────────────────────────────

            async function loadCatalog() {
                try {
                    var catalog = await fetchJson("/packs/catalog.json");
                    CATALOG_DATA = catalog;
                    renderCatalog(catalog);
                } catch (err) {
                    document.getElementById("catalog-list").textContent =
                        "Catalog not available: " + err.message;
                }
            }

            function renderCatalog(catalog) {
                var el = document.getElementById("catalog-list");
                el.innerHTML = "";
                if (!catalog || !catalog.packs || catalog.packs.length === 0) {
                    el.textContent = "No packs in catalog";
                    return;
                }

                for (var pi = 0; pi < catalog.packs.length; pi++) {
                    var pack = catalog.packs[pi];
                    var packDiv = document.createElement("div");
                    packDiv.className = "catalog-pack";
                    var header = document.createElement("div");
                    var totalMB = (pack.totalBytes / 1024 / 1024).toFixed(1);
                    header.textContent =
                        pack.label + " (" + pack.id + ") — " + totalMB + " MB";
                    packDiv.appendChild(header);

                    // Artifact list
                    if (pack.artifacts) {
                        for (var ai = 0; ai < pack.artifacts.length; ai++) {
                            var art = pack.artifacts[ai];
                            var artDiv = document.createElement("div");
                            artDiv.className = "catalog-artifact";
                            var sizeKB = (art.bytes / 1024).toFixed(0);
                            var name = art.kind;
                            if (art.category) name += " / " + art.category;
                            name += " (" + sizeKB + " KB)";
                            artDiv.textContent = name;
                            artDiv.title = "Download " + art.kind + " artifact";
                            // Click to download (the user then drops the file onto the viewer)
                            artDiv.addEventListener(
                                "click",
                                (function (url) {
                                    return function () {
                                        window.open(url, "_blank");
                                    };
                                })(art.url),
                            );
                            packDiv.appendChild(artDiv);
                        }
                    }

                    el.appendChild(packDiv);
                }
            }

            // ── Drag-drop ─────────────────────────────────────────────────

            var dropZone = document.getElementById("drop-zone");

            dropZone.addEventListener("dragover", function (e) {
                e.preventDefault();
                dropZone.classList.add("dragover");
            });
            dropZone.addEventListener("dragleave", function () {
                dropZone.classList.remove("dragover");
            });
            dropZone.addEventListener("drop", function (e) {
                e.preventDefault();
                dropZone.classList.remove("dragover");
                var files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleDroppedFile(files[0]);
                }
            });
            dropZone.addEventListener("click", function () {
                var input = document.createElement("input");
                input.type = "file";
                input.accept = ".json,.json.gz,.gz";
                input.addEventListener("change", function () {
                    if (input.files.length > 0)
                        handleDroppedFile(input.files[0]);
                });
                input.click();
            });

            async function handleDroppedFile(file) {
                var name = file.name;
                clearPackLayers();
                var container = document.getElementById(
                    "pack-layers-container",
                );
                container.innerHTML = "";
                document.getElementById("provenance-panel").style.display =
                    "none";

                try {
                    var payload;
                    if (name.endsWith(".gz")) {
                        var reader = new FileReader();
                        var arrayBuf = await new Promise(function (
                            resolve,
                            reject,
                        ) {
                            reader.onload = function () {
                                resolve(reader.result);
                            };
                            reader.onerror = reject;
                            reader.readAsArrayBuffer(file);
                        });
                        var ds = new DecompressionStream("gzip");
                        var decompressed = await new Response(
                            new ReadableStream({
                                start: function (c) {
                                    c.enqueue(arrayBuf);
                                    c.close();
                                },
                            }).pipeThrough(ds),
                        ).arrayBuffer();
                        var text = new TextDecoder("utf-8").decode(
                            decompressed,
                        );
                        payload = JSON.parse(text);
                    } else if (name.endsWith(".json")) {
                        payload = await file.text().then(JSON.parse);
                    } else {
                        dropZone.textContent = "Unsupported file type: " + name;
                        return;
                    }

                    var kind = sniffKind(payload);
                    if (!kind) {
                        dropZone.textContent = "Unknown artifact format";
                        return;
                    }

                    dropZone.textContent = "Loaded: " + name;

                    // Show provenance
                    showProvenance(payload, name, kind);

                    // Render based on kind
                    if (kind === "poi") {
                        renderDroppedPoi(payload);
                    } else if (kind === "measuring") {
                        renderDroppedMeasuring(payload);
                    } else if (kind === "boundaries") {
                        renderDroppedBoundaries(payload);
                    } else if (kind === "transit") {
                        renderDroppedTransit(payload);
                    } else if (kind === "meta") {
                        renderDroppedMeta(payload);
                    }
                } catch (err) {
                    dropZone.textContent = "Error: " + err.message;
                    console.error(err);
                }
            }

            function showProvenance(payload, name, kind) {
                var panel = document.getElementById("provenance-panel");
                panel.style.display = "block";
                var lines = [];
                lines.push("<strong>File:</strong> " + name);
                lines.push("<strong>Kind:</strong> " + kind);
                if (payload.schemaVersion != null)
                    lines.push(
                        "<strong>Schema:</strong> v" + payload.schemaVersion,
                    );
                if (payload.generatedAt)
                    lines.push(
                        "<strong>Generated:</strong> " + payload.generatedAt,
                    );
                if (payload.totalCount != null)
                    lines.push(
                        "<strong>Total POIs:</strong> " + payload.totalCount,
                    );
                if (kind === "measuring" && payload.features)
                    lines.push(
                        "<strong>Features:</strong> " + payload.features.length,
                    );
                if (kind === "boundaries" && payload.index) {
                    lines.push(
                        "<strong>Boundary entries:</strong> " +
                            payload.index.length,
                    );
                    var levelCounts = {};
                    for (var i = 0; i < payload.index.length; i++) {
                        var lv = payload.index[i].adminLevel;
                        if (lv != null)
                            levelCounts[lv] = (levelCounts[lv] || 0) + 1;
                    }
                    var levelLines = [];
                    for (var lvKey in levelCounts) {
                        levelLines.push(
                            "Level " + lvKey + ": " + levelCounts[lvKey],
                        );
                    }
                    lines.push(
                        "<strong>Per-level:</strong> " + levelLines.join(", "),
                    );
                }
                if (kind === "transit" && payload.presets) {
                    lines.push(
                        "<strong>Presets:</strong> " + payload.presets.length,
                    );
                    var stationCount = 0;
                    for (var i = 0; i < payload.presets.length; i++) {
                        stationCount += (payload.presets[i].stations || [])
                            .length;
                    }
                    lines.push("<strong>Stations:</strong> ~" + stationCount);
                }
                if (payload.source)
                    lines.push("<strong>Source:</strong> " + payload.source);
                panel.innerHTML = lines.join("<br>");
            }

            function renderDroppedPoi(payload) {
                var container = document.getElementById(
                    "pack-layers-container",
                );
                container.innerHTML = "";
                var cats = payload.categories || {};
                var catKeys = Object.keys(cats);

                for (var ci = 0; ci < catKeys.length; ci++) {
                    var category = catKeys[ci];
                    var cat = cats[category];
                    (function (catName, catData) {
                        var label = document.createElement("label");
                        label.style.cssText =
                            "display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;";
                        var cb = document.createElement("input");
                        cb.type = "checkbox";
                        cb.setAttribute("data-layer-id", "poi-" + catName);
                        var color = POI_COLORS[catName] || "#9ca3af";
                        var swatch = document.createElement("span");
                        swatch.className = "legend-swatch polygon";
                        swatch.style.cssText =
                            "background:" +
                            color +
                            ";display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:6px;vertical-align:middle;";

                        cb.addEventListener("change", function () {
                            var sourceId = "drop-poi-" + catName;
                            var layerId = "drop-poi-circle-" + catName;
                            if (this.checked && !PACK_LOADED_LAYERS[sourceId]) {
                                var fc =
                                    window.columnarToGeojson.categoryToFeatures(
                                        catName,
                                        catData,
                                    );
                                addSource(sourceId, fc);
                                map.addLayer({
                                    id: layerId,
                                    type: "circle",
                                    source: sourceId,
                                    paint: {
                                        "circle-radius": [
                                            "interpolate",
                                            ["linear"],
                                            ["zoom"],
                                            6,
                                            1.5,
                                            10,
                                            3,
                                            14,
                                            7,
                                        ],
                                        "circle-color": color,
                                        "circle-opacity": 0.7,
                                        "circle-stroke-width": 0.5,
                                        "circle-stroke-color": "#fff",
                                    },
                                });
                                PACK_LOADED_LAYERS[sourceId] = true;
                                addDropPoiHover(layerId);
                            } else if (!this.checked) {
                                removeSourceAndLayers(sourceId);
                                delete PACK_LOADED_LAYERS[sourceId];
                            }
                        });

                        label.appendChild(cb);
                        label.appendChild(swatch);
                        label.appendChild(
                            document.createTextNode(
                                catName + " (" + catData.count + ")",
                            ),
                        );
                        container.appendChild(label);
                    })(category, cat);
                }
                fitBbox(payload.bbox);
            }

            function renderDroppedMeasuring(payload) {
                var container = document.getElementById(
                    "pack-layers-container",
                );
                container.innerHTML = "";
                var category = payload.category || "unknown";
                var features = payload.features || [];

                var label = document.createElement("label");
                label.style.cssText =
                    "display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;";
                var cb = document.createElement("input");
                cb.type = "checkbox";
                cb.setAttribute("data-layer-id", "measuring-" + category);
                cb.addEventListener("change", function () {
                    var sourceId = "drop-measuring";
                    if (this.checked && !PACK_LOADED_LAYERS[sourceId]) {
                        var fc = {
                            type: "FeatureCollection",
                            features: features,
                        };
                        addSource(sourceId, fc);
                        // Use pre-defined config if available, else generic line
                        var configs = CONFIG_LAYERS[category];
                        if (configs) {
                            addLayers(
                                sourceId,
                                JSON.parse(JSON.stringify(configs)),
                            );
                        } else {
                            map.addLayer({
                                id: "drop-measuring-line",
                                type: "line",
                                source: sourceId,
                                paint: {
                                    "line-color": "#2563eb",
                                    "line-width": 2,
                                },
                            });
                        }
                        PACK_LOADED_LAYERS[sourceId] = true;
                    } else if (!this.checked) {
                        removeSourceAndLayers(sourceId);
                        delete PACK_LOADED_LAYERS[sourceId];
                    }
                });
                label.appendChild(cb);
                label.appendChild(
                    document.createTextNode(
                        category + " (" + features.length + " features)",
                    ),
                );
                container.appendChild(label);
                fitBbox(payload.extractBbox);
            }

            function renderDroppedBoundaries(payload) {
                var container = document.getElementById(
                    "pack-layers-container",
                );
                container.innerHTML = "";
                var levels = payload.levels || [];
                var levelCounts = {};
                for (var i = 0; i < payload.index.length; i++) {
                    var lv = payload.index[i].adminLevel;
                    if (lv != null)
                        levelCounts[lv] = (levelCounts[lv] || 0) + 1;
                }

                for (var li = 0; li < levels.length; li++) {
                    var level = levels[li];
                    (function (lv) {
                        var colors = BOUNDARY_COLORS[lv] || {
                            fill: "rgba(156, 163, 175, 0.12)",
                            line: "#9ca3af",
                        };
                        var label = document.createElement("label");
                        label.style.cssText =
                            "display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;";
                        var cb = document.createElement("input");
                        cb.type = "checkbox";
                        cb.setAttribute("data-layer-id", "boundaries-" + lv);
                        var swatch = document.createElement("span");
                        swatch.className = "legend-swatch polygon";
                        swatch.style.cssText =
                            "background:" +
                            colors.fill +
                            ";border:1.5px solid " +
                            colors.line +
                            ";display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:6px;vertical-align:middle;";

                        cb.addEventListener("change", function () {
                            var sourceId = "drop-boundaries-" + lv;
                            var fillLayerId = "drop-boundaries-fill-" + lv;
                            var lineLayerId = "drop-boundaries-line-" + lv;
                            if (this.checked && !PACK_LOADED_LAYERS[sourceId]) {
                                var features = [];
                                for (
                                    var ei = 0;
                                    ei < payload.index.length;
                                    ei++
                                ) {
                                    var entry = payload.index[ei];
                                    if (entry.adminLevel !== lv) continue;
                                    var rid = String(entry.relationId);
                                    var encoded = payload.polygons[rid];
                                    if (!encoded) continue;
                                    var decoded =
                                        window.deltaEncode.decodeDeltaPolygon(
                                            encoded,
                                        );
                                    var geomType =
                                        decoded.length > 1
                                            ? "MultiPolygon"
                                            : "Polygon";
                                    var coords =
                                        decoded.length === 1
                                            ? decoded[0]
                                            : decoded;
                                    features.push({
                                        type: "Feature",
                                        geometry: {
                                            type: geomType,
                                            coordinates: coords,
                                        },
                                        properties: {
                                            relationId: entry.relationId,
                                            name: entry.name,
                                            nameEn: entry.nameEn || null,
                                            adminLevel: entry.adminLevel,
                                        },
                                    });
                                }
                                var fc = {
                                    type: "FeatureCollection",
                                    features: features,
                                };
                                addSource(sourceId, fc);
                                map.addLayer({
                                    id: fillLayerId,
                                    type: "fill",
                                    source: sourceId,
                                    paint: {
                                        "fill-color": colors.line,
                                        "fill-opacity": 0.1,
                                    },
                                });
                                map.addLayer({
                                    id: lineLayerId,
                                    type: "line",
                                    source: sourceId,
                                    paint: {
                                        "line-color": colors.line,
                                        "line-width": 2,
                                        "line-opacity": 0.7,
                                    },
                                });
                                PACK_LOADED_LAYERS[sourceId] = true;
                            } else if (!this.checked) {
                                removeSourceAndLayers(sourceId);
                                delete PACK_LOADED_LAYERS[sourceId];
                            }
                        });

                        label.appendChild(cb);
                        label.appendChild(swatch);
                        label.appendChild(
                            document.createTextNode(
                                "Admin level " +
                                    lv +
                                    " (" +
                                    (levelCounts[lv] || 0) +
                                    ")",
                            ),
                        );
                        container.appendChild(label);
                    })(level);
                }
            }

            function renderDroppedTransit(payload) {
                var container = document.getElementById(
                    "pack-layers-container",
                );
                container.innerHTML = "";
                var presets = payload.presets || [];

                // Route lines
                var routeLabel = document.createElement("label");
                routeLabel.style.cssText =
                    "display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;";
                var routeCb = document.createElement("input");
                routeCb.type = "checkbox";
                routeCb.setAttribute("data-layer-id", "transit-routes");
                routeLabel.appendChild(routeCb);
                routeLabel.appendChild(
                    document.createTextNode(
                        "Route lines (" + presets.length + " presets)",
                    ),
                );
                routeCb.addEventListener("change", function () {
                    var sourceId = "drop-transit-routes";
                    if (this.checked && !PACK_LOADED_LAYERS[sourceId]) {
                        var fc =
                            window.transitGeojson.buildRouteFeatureCollection(
                                presets,
                            );
                        addSource(sourceId, fc);
                        map.addLayer({
                            id: "drop-transit-routes-line",
                            type: "line",
                            source: sourceId,
                            layout: {
                                visibility: "visible",
                                "line-cap": "round",
                                "line-join": "round",
                            },
                            paint: {
                                "line-color": [
                                    "to-color",
                                    ["get", "color"],
                                    "#888",
                                ],
                                "line-width": [
                                    "interpolate",
                                    ["linear"],
                                    ["zoom"],
                                    6,
                                    1,
                                    10,
                                    2,
                                    13,
                                    4,
                                    16,
                                    7,
                                ],
                                "line-opacity": 0.9,
                            },
                        });
                        PACK_LOADED_LAYERS[sourceId] = true;
                    } else if (!this.checked) {
                        removeSourceAndLayers(sourceId);
                        delete PACK_LOADED_LAYERS[sourceId];
                    }
                });
                container.appendChild(routeLabel);

                // Stations
                var stationLabel = document.createElement("label");
                stationLabel.style.cssText =
                    "display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;";
                var stationCb = document.createElement("input");
                stationCb.type = "checkbox";
                stationCb.setAttribute("data-layer-id", "transit-stations");
                stationLabel.appendChild(stationCb);
                stationLabel.appendChild(document.createTextNode("Stations"));
                stationCb.addEventListener("change", function () {
                    var sourceId = "drop-transit-stations";
                    var dotSourceId = "drop-transit-stations-dot";
                    var sizeIds = [
                        { key: "large", minzoom: 11, maxzoom: 13 },
                        { key: "medium", minzoom: 13, maxzoom: 15 },
                        { key: "small", minzoom: 15, maxzoom: undefined },
                    ];
                    if (this.checked && !PACK_LOADED_LAYERS[sourceId]) {
                        var stations =
                            window.transitGeojson.getSelectedStations(presets);
                        var allWedges =
                            window.transitGeojson.buildAllWedgeFeatureCollections(
                                stations,
                            );
                        // Layer order: outlines → wedges → dots.
                        // 1. Add all wedge GeoJSON sources (no layers).
                        for (var si = 0; si < sizeIds.length; si++) {
                            var sz = sizeIds[si];
                            if (!allWedges[sz.key]) continue;
                            var szSrcId = sourceId + "-" + sz.key;
                            addSource(szSrcId, allWedges[sz.key]);
                        }
                        // 2. Dot source (shared by low-zoom dots and
                        //    white outline rings).
                        var dotData = buildDotsFromWedges(allWedges.large);
                        addSource(dotSourceId, dotData);
                        // 3. White circle outlines — behind wedges.
                        var outlineDefs = [
                            {
                                id: "drop-transit-stations-outline-large",
                                minzoom: 11,
                                maxzoom: 13,
                                radius: [
                                    "interpolate",
                                    ["linear"],
                                    ["zoom"],
                                    11,
                                    1.5,
                                    12,
                                    3,
                                    13,
                                    6,
                                ],
                            },
                            {
                                id: "drop-transit-stations-outline-medium",
                                minzoom: 13,
                                maxzoom: 15,
                                radius: [
                                    "interpolate",
                                    ["linear"],
                                    ["zoom"],
                                    13,
                                    2.5,
                                    14,
                                    5,
                                    15,
                                    10,
                                ],
                            },
                            {
                                id: "drop-transit-stations-outline-small",
                                minzoom: 15,
                                radius: [
                                    "interpolate",
                                    ["linear"],
                                    ["zoom"],
                                    15,
                                    4.5,
                                    16,
                                    9,
                                    18,
                                    34,
                                ],
                            },
                        ];
                        for (var oi = 0; oi < outlineDefs.length; oi++) {
                            var od = outlineDefs[oi];
                            var outlineOpts = {
                                id: od.id,
                                type: "circle",
                                source: dotSourceId,
                                minzoom: od.minzoom,
                                paint: {
                                    "circle-opacity": 0,
                                    "circle-stroke-color": "#fff",
                                    "circle-stroke-width": 1.5,
                                    "circle-radius": od.radius,
                                },
                            };
                            if (od.maxzoom != null)
                                outlineOpts.maxzoom = od.maxzoom;
                            map.addLayer(outlineOpts);
                        }
                        // 4. Wedge fill layers — on top of outlines.
                        for (var si = 0; si < sizeIds.length; si++) {
                            var sz = sizeIds[si];
                            var szSrcId = sourceId + "-" + sz.key;
                            if (!map.getSource(szSrcId)) continue;
                            var layerOpts = {
                                id: "drop-transit-stations-wedge-" + sz.key,
                                type: "fill",
                                source: szSrcId,
                                minzoom: sz.minzoom,
                                paint: {
                                    "fill-color": [
                                        "to-color",
                                        ["get", "color"],
                                        "#888",
                                    ],
                                    "fill-opacity": 0.9,
                                    "fill-antialias": true,
                                },
                            };
                            if (sz.maxzoom != null)
                                layerOpts.maxzoom = sz.maxzoom;
                            map.addLayer(layerOpts);
                            PACK_LOADED_LAYERS[szSrcId] = true;
                        }
                        // 5. Dot circle layer — low zoom.
                        map.addLayer({
                            id: "drop-transit-stations-dot",
                            type: "circle",
                            source: dotSourceId,
                            maxzoom: 11,
                            paint: {
                                "circle-color": [
                                    "to-color",
                                    ["get", "color"],
                                    "#888",
                                ],
                                "circle-opacity": [
                                    "interpolate",
                                    ["linear"],
                                    ["zoom"],
                                    10,
                                    0.95,
                                    11,
                                    0,
                                ],
                                "circle-radius": [
                                    "interpolate",
                                    ["linear"],
                                    ["zoom"],
                                    0,
                                    0.5,
                                    6,
                                    1.5,
                                    10,
                                    3,
                                    11,
                                    5,
                                ],
                                "circle-stroke-color": "#fff",
                                "circle-stroke-width": 1,
                            },
                        });
                        PACK_LOADED_LAYERS[sourceId] = true;
                        PACK_LOADED_LAYERS[dotSourceId] = true;
                    } else if (!this.checked) {
                        for (var si = 0; si < sizeIds.length; si++) {
                            var szSrcId = sourceId + "-" + sizeIds[si].key;
                            removeSourceAndLayers(szSrcId);
                            delete PACK_LOADED_LAYERS[szSrcId];
                        }
                        removeSourceAndLayers(dotSourceId);
                        delete PACK_LOADED_LAYERS[dotSourceId];
                        delete PACK_LOADED_LAYERS[sourceId];
                        // Remove outline layers (they share dotSourceId
                        // but have distinct layer ids).
                        var outlineIds = [
                            "drop-transit-stations-outline-large",
                            "drop-transit-stations-outline-medium",
                            "drop-transit-stations-outline-small",
                        ];
                        for (var oi = 0; oi < outlineIds.length; oi++) {
                            if (map.getLayer(outlineIds[oi]))
                                map.removeLayer(outlineIds[oi]);
                        }
                    }
                });
                container.appendChild(stationLabel);

                // Station hover + click for dropped transit.
                function addDropStationHover(layerId) {
                    map.on("mouseenter", layerId, function (e) {
                        map.getCanvas().style.cursor = "pointer";
                        var p = e.features[0].properties;
                        var html = "<strong>" + p.name + "</strong>";
                        if (p.nameEn && p.nameEn !== p.name)
                            html +=
                                '<br><span style="color:#888;font-size:12px">' +
                                p.nameEn +
                                "</span>";
                        if (p.operators)
                            html += "<br><em>" + p.operators + "</em>";
                        if (p.routeNames)
                            html +=
                                '<br><span style="color:#666">' +
                                p.routeNames +
                                "</span>";
                        if (p.routeNamesEn && p.routeNamesEn !== p.routeNames)
                            html +=
                                '<br><span style="color:#888;font-size:12px">' +
                                p.routeNamesEn +
                                "</span>";
                        if (p.wedgeCount && p.wedgeCount > 1) {
                            html +=
                                '<br><span style="color:#999;font-size:11px">' +
                                p.wedgeCount +
                                " routes</span>";
                        }
                        POPUP.setLngLat(e.lngLat).setHTML(html).addTo(map);
                    });

                    map.on("mouseleave", layerId, function () {
                        map.getCanvas().style.cursor = "";
                        POPUP.remove();
                    });

                    map.on("click", layerId, function (e) {
                        copyNodeInfo(e.features[0]);
                    });
                }

                addDropStationHover("drop-transit-stations-wedge-large");
                addDropStationHover("drop-transit-stations-wedge-medium");
                addDropStationHover("drop-transit-stations-wedge-small");
                addDropStationHover("drop-transit-stations-dot");
            }

            function renderDroppedMeta(payload) {
                var infoEl = document.getElementById("pack-meta-info");
                infoEl.textContent =
                    payload.label +
                    " (" +
                    (payload.regionPath || []).join(" / ") +
                    ")";
                if (payload.bbox) fitBbox(payload.bbox);

                var container = document.getElementById(
                    "pack-layers-container",
                );
                container.innerHTML = "";

                // POI categories listed (not loadable without the actual POI bundle)
                var matchingCats =
                    payload.categories && payload.categories.matching;
                if (matchingCats && matchingCats.length > 0) {
                    var catHeader = document.createElement("div");
                    catHeader.style.cssText =
                        "font-weight:600;font-size:11px;margin-top:4px;";
                    catHeader.textContent =
                        "Matching categories: " + matchingCats.join(", ");
                    container.appendChild(catHeader);
                }

                var measCats =
                    payload.categories && payload.categories.measuring;
                if (measCats && measCats.length > 0) {
                    var measHeader = document.createElement("div");
                    measHeader.style.cssText =
                        "font-weight:600;font-size:11px;margin-top:4px;";
                    measHeader.textContent =
                        "Measuring categories: " + measCats.join(", ");
                    container.appendChild(measHeader);
                }

                var bndLevels =
                    payload.adminLevels && payload.adminLevels.extract;
                if (bndLevels && bndLevels.length > 0) {
                    var bndHeader = document.createElement("div");
                    bndHeader.style.cssText =
                        "font-weight:600;font-size:11px;margin-top:4px;";
                    bndHeader.textContent =
                        "Boundary levels: " + bndLevels.join(", ");
                    container.appendChild(bndHeader);
                }

                container.appendChild(
                    document.createTextNode(
                        "Drop individual artifacts to inspect them on the map.",
                    ),
                );
            }
        </script>
    </body>
</html>
