<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Data Viewer — JetLag Hide &amp; Seek</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
        />
        <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
            }
            #map {
                width: 100vw;
                height: 100vh;
            }
            #loading {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.7);
                color: #fff;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 10;
                pointer-events: none;
                transition: opacity 0.3s;
            }
            #loading.hidden {
                opacity: 0;
            }
            #legend {
                position: fixed;
                top: 10px;
                right: 10px;
                background: rgba(255, 255, 255, 0.92);
                border-radius: 8px;
                padding: 10px 14px;
                font-size: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
                z-index: 5;
                line-height: 1.8;
            }
            .legend-swatch {
                display: inline-block;
                width: 20px;
                height: 3px;
                vertical-align: middle;
                margin-right: 6px;
                border-radius: 2px;
            }
            .legend-swatch.polygon {
                height: 12px;
                width: 12px;
                border-radius: 2px;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <div id="loading">Loading layers…</div>
        <div id="legend">
            <div style="font-weight: 600; margin-bottom: 2px">
                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        cursor: pointer;
                    "
                >
                    <input type="checkbox" id="toggle-lines-polygons" checked />
                    Lines &amp; Polygons
                </label>
            </div>
            <div>
                <span class="legend-swatch" style="background: #2563eb"></span
                >Coastline
            </div>
            <div>
                <span
                    class="legend-swatch"
                    style="background: #dc2626; height: 3px"
                ></span
                >High-speed rail
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="
                        background: rgba(56, 189, 248, 0.4);
                        border: 1px solid #1d4ed8;
                    "
                ></span
                >Body of water (polygon)
            </div>
            <div>
                <span class="legend-swatch" style="background: #059669"></span
                >Body of water (waterway)
            </div>
            <div>
                <span
                    class="legend-swatch"
                    style="
                        background: #ea580c;
                        border-top: 2px dashed #ea580c;
                        height: 0;
                    "
                ></span
                >Admin 1st border
            </div>
            <div>
                <span
                    class="legend-swatch"
                    style="
                        background: #6b7280;
                        border-top: 1.5px dashed #6b7280;
                        height: 0;
                    "
                ></span
                >Admin 2nd border
            </div>
            <div>
                <span
                    class="legend-swatch"
                    style="background: #16a34a; height: 2px"
                ></span
                >Default zones
            </div>
            <hr
                style="
                    border: none;
                    border-top: 1px solid #e5e7eb;
                    margin: 4px 0;
                "
            />
            <div style="font-weight: 600; margin-bottom: 2px">
                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        cursor: pointer;
                    "
                >
                    <input type="checkbox" id="toggle-pois" checked />
                    POIs (33,757)
                </label>
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #22c55e"
                ></span
                >Park
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #ef4444"
                ></span
                >Hospital
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #a855f7"
                ></span
                >Museum
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #78716c"
                ></span
                >Mountain
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #f59e0b"
                ></span
                >Landmark
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #3b82f6"
                ></span
                >Library
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #15803d"
                ></span
                >Golf course
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #ec4899"
                ></span
                >Movie theater
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #6366f1"
                ></span
                >Foreign consulate
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #f97316"
                ></span
                >Amusement park
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #14b8a6"
                ></span
                >Zoo
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #06b6d4"
                ></span
                >Aquarium
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #e11d48"
                ></span
                >Airport
            </div>
            <div>
                <span
                    class="legend-swatch polygon"
                    style="background: #8b5cf6"
                ></span
                >Station name length
            </div>
            <hr
                style="
                    border: none;
                    border-top: 1px solid #e5e7eb;
                    margin: 4px 0;
                "
            />
            <div style="font-weight: 600; margin-bottom: 4px">Transit</div>
            <div>
                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        cursor: pointer;
                    "
                >
                    <input type="checkbox" id="toggle-transit-routes" />
                    <span
                        class="legend-swatch"
                        style="
                            background: linear-gradient(
                                90deg,
                                #009bbf,
                                #c9242f,
                                #b1cb39
                            );
                        "
                    ></span
                    >Route lines
                </label>
            </div>
            <div>
                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        cursor: pointer;
                    "
                >
                    <input type="checkbox" id="toggle-transit-stations" />
                    <span
                        class="legend-swatch polygon"
                        style="background: #1f6f78; border: 1.5px solid #fff"
                    ></span
                    >Stations
                </label>
            </div>
            <div id="pack-section" style="display: none">
                <hr
                    style="
                        border: none;
                        border-top: 1px solid #e5e7eb;
                        margin: 4px 0;
                    "
                />
                <div style="font-weight: 600; margin-bottom: 4px">
                    <label style="display: flex; align-items: center; gap: 4px">
                        Pack
                        <select
                            id="pack-select"
                            style="font-size: 11px; max-width: 140px"
                        ></select>
                    </label>
                </div>
                <div
                    id="pack-meta-info"
                    style="font-size: 10px; color: #666; margin-bottom: 4px"
                ></div>
                <div id="pack-poi-section" style="margin-top: 4px"></div>
                <div id="pack-measuring-section" style="margin-top: 4px"></div>
                <div id="pack-boundaries-section" style="margin-top: 4px"></div>
                <div id="pack-transit-section" style="margin-top: 4px"></div>
            </div>
        </div>
        <script>
            const KANTO_BBOX = [137.9, 33.9, 141.9, 37.9];

            const map = new maplibregl.Map({
                container: "map",
                style: {
                    version: 8,
                    sources: {
                        osm: {
                            type: "raster",
                            tiles: [
                                "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                            ],
                            tileSize: 256,
                            attribution: "© OpenStreetMap contributors",
                            maxzoom: 19,
                        },
                    },
                    layers: [{ id: "osm", type: "raster", source: "osm" }],
                },
                bounds: KANTO_BBOX,
                fitBoundsOptions: { padding: 20 },
            });

            const SOURCES = {
                coastline: "/api/measuring/coastline",
                "high-speed-rail": "/api/measuring/high-speed-rail",
                "body-of-water": "/api/measuring/body-of-water",
                "admin-1st-border": "/api/measuring/admin-1st-border",
                "admin-2nd-border": "/api/measuring/admin-2nd-border",
                zones: "/api/zones",
                pois: "/api/pois",
                "transit-routes": "/api/transit-routes",
                "transit-stations": "/api/transit-stations",
            };

            async function fetchJson(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(url + ": " + res.status);
                return res.json();
            }

            function addSource(id, data) {
                map.addSource(id, { type: "geojson", data: data });
            }

            function addLayers(id, config) {
                for (var li = 0; li < config.length; li++) {
                    map.addLayer(Object.assign({}, config[li], { source: id }));
                }
            }

            function removeSourceAndLayers(id) {
                var layers = map.getStyle().layers || [];
                for (var li = 0; li < layers.length; li++) {
                    if (layers[li].source === id) {
                        if (map.getLayer(layers[li].id)) {
                            map.removeLayer(layers[li].id);
                        }
                    }
                }
                if (map.getSource(id)) {
                    map.removeSource(id);
                }
            }

            var POPUP = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false,
                offset: 8,
                maxWidth: "240px",
            });

            var POI_COLORS = {
                park: "#22c55e",
                hospital: "#ef4444",
                museum: "#a855f7",
                mountain: "#78716c",
                landmark: "#f59e0b",
                library: "#3b82f6",
                "golf-course": "#15803d",
                "movie-theater": "#ec4899",
                "foreign-consulate": "#6366f1",
                "amusement-park": "#f97316",
                zoo: "#14b8a6",
                aquarium: "#06b6d4",
                "commercial-airport": "#e11d48",
                "station-name-length": "#8b5cf6",
            };

            var BOUNDARY_COLORS = {
                4: { fill: "rgba(234, 88, 12, 0.12)", line: "#ea580c" },
                7: { fill: "rgba(107, 114, 128, 0.12)", line: "#6b7280" },
                8: { fill: "rgba(59, 130, 246, 0.12)", line: "#3b82f6" },
                9: { fill: "rgba(22, 163, 74, 0.12)", line: "#16a34a" },
                10: { fill: "rgba(139, 92, 246, 0.12)", line: "#8b5cf6" },
            };

            var PACK_STATE = {
                regionId: null,
                meta: null,
                loadedLayers: {},
            };

            var LAYER_CONFIGS = {
                coastline: [
                    {
                        id: "coastline-line",
                        type: "line",
                        paint: { "line-color": "#2563eb", "line-width": 3 },
                    },
                ],
                "high-speed-rail": [
                    {
                        id: "hsr-line",
                        type: "line",
                        paint: { "line-color": "#dc2626", "line-width": 5 },
                    },
                ],
                "body-of-water": [
                    {
                        id: "water-fill",
                        type: "fill",
                        filter: [
                            "any",
                            ["==", ["geometry-type"], "Polygon"],
                            ["==", ["geometry-type"], "MultiPolygon"],
                        ],
                        paint: {
                            "fill-color": "#38bdf8",
                            "fill-opacity": 0.35,
                        },
                    },
                    {
                        id: "water-outline",
                        type: "line",
                        filter: [
                            "any",
                            ["==", ["geometry-type"], "Polygon"],
                            ["==", ["geometry-type"], "MultiPolygon"],
                        ],
                        paint: { "line-color": "#1d4ed8", "line-width": 1.6 },
                    },
                    {
                        id: "waterway-line",
                        type: "line",
                        filter: ["==", ["geometry-type"], "LineString"],
                        paint: { "line-color": "#059669", "line-width": 2 },
                    },
                ],
                "admin-1st-border": [
                    {
                        id: "admin1-line",
                        type: "line",
                        paint: {
                            "line-color": "#ea580c",
                            "line-width": 3,
                            "line-dasharray": [6, 3],
                        },
                    },
                ],
                "admin-2nd-border": [
                    {
                        id: "admin2-line",
                        type: "line",
                        paint: {
                            "line-color": "#6b7280",
                            "line-width": 2,
                            "line-dasharray": [4, 3],
                        },
                    },
                ],
                zones: [
                    {
                        id: "zones-fill",
                        type: "fill",
                        paint: {
                            "fill-color": "#16a34a",
                            "fill-opacity": 0.08,
                        },
                    },
                    {
                        id: "zones-outline",
                        type: "line",
                        paint: { "line-color": "#16a34a", "line-width": 2 },
                    },
                ],
                pois: [
                    {
                        id: "poi-circle",
                        type: "circle",
                        paint: {
                            "circle-radius": [
                                "interpolate",
                                ["linear"],
                                ["zoom"],
                                6,
                                1.5,
                                10,
                                3,
                                14,
                                7,
                            ],
                            "circle-color": [
                                "match",
                                ["get", "category"],
                                "park",
                                "#22c55e",
                                "hospital",
                                "#ef4444",
                                "museum",
                                "#a855f7",
                                "mountain",
                                "#78716c",
                                "landmark",
                                "#f59e0b",
                                "library",
                                "#3b82f6",
                                "golf-course",
                                "#15803d",
                                "movie-theater",
                                "#ec4899",
                                "foreign-consulate",
                                "#6366f1",
                                "amusement-park",
                                "#f97316",
                                "zoo",
                                "#14b8a6",
                                "aquarium",
                                "#06b6d4",
                                "commercial-airport",
                                "#e11d48",
                                "station-name-length",
                                "#8b5cf6",
                                "#9ca3af",
                            ],
                            "circle-opacity": 0.7,
                            "circle-stroke-width": 0.5,
                            "circle-stroke-color": "#fff",
                        },
                    },
                ],
                "transit-routes": [
                    {
                        id: "transit-routes-line",
                        type: "line",
                        layout: {
                            visibility: "none",
                            "line-cap": "round",
                            "line-join": "round",
                        },
                        paint: {
                            "line-color": [
                                "to-color",
                                ["get", "color"],
                                "#888",
                            ],
                            "line-width": [
                                "interpolate",
                                ["linear"],
                                ["zoom"],
                                6,
                                1,
                                10,
                                2,
                                13,
                                4,
                                16,
                                7,
                            ],
                            "line-opacity": 0.9,
                        },
                    },
                ],
                "transit-stations": Array.from({ length: 6 }, function (_, i) {
                    return {
                        id: "transit-stations-ring-" + (5 - i),
                        type: "circle",
                        filter: ["==", ["get", "ringIndex"], 5 - i],
                        layout: { visibility: "none" },
                        paint: {
                            "circle-color": [
                                "to-color",
                                ["get", "color"],
                                "#888",
                            ],
                            "circle-opacity": 0.95,
                            "circle-radius": 5 + (5 - i) * 3,
                            "circle-stroke-color": "#fff",
                            "circle-stroke-width": 1.5,
                        },
                    };
                }),
            };

            async function loadLayers() {
                var entries = Object.entries(SOURCES);
                var results = await Promise.allSettled(
                    entries.map(function (e) {
                        return fetchJson(e[1]);
                    }),
                );

                var loaded = 0;
                for (var i = 0; i < entries.length; i++) {
                    var id = entries[i][0];
                    var result = results[i];
                    if (result.status === "rejected") {
                        console.error(
                            "Failed to load " + id + ":",
                            result.reason,
                        );
                        continue;
                    }
                    addSource(id, result.value);
                    addLayers(id, LAYER_CONFIGS[id]);
                    loaded++;
                }

                document.getElementById("loading").classList.add("hidden");
                console.log(
                    "Loaded " + loaded + "/" + entries.length + " layers",
                );
            }

            map.on("load", function () {
                loadLayers().then(initPackMode);
            });

            map.on("mouseenter", "poi-circle", function (e) {
                map.getCanvas().style.cursor = "pointer";
                var p = e.features[0].properties;
                var html =
                    "<strong>" +
                    (p.name || "(unnamed)") +
                    "</strong><br>" +
                    p.category;
                if (p.osmId)
                    html += "<br>osm " + (p.osmType || "") + " " + p.osmId;
                if (p.iata) html += " &middot; IATA " + p.iata;
                POPUP.setLngLat(e.lngLat).setHTML(html).addTo(map);
            });

            map.on("mouseleave", "poi-circle", function () {
                map.getCanvas().style.cursor = "";
                POPUP.remove();
            });

            // ── Layer toggles ───────────────────────────────────────────
            var LINE_POLYGON_LAYERS = [
                "coastline-line",
                "hsr-line",
                "water-fill",
                "water-outline",
                "waterway-line",
                "admin1-line",
                "admin2-line",
                "zones-fill",
                "zones-outline",
            ];

            document
                .getElementById("toggle-lines-polygons")
                .addEventListener("change", function (e) {
                    var vis = e.target.checked ? "visible" : "none";
                    for (var i = 0; i < LINE_POLYGON_LAYERS.length; i++) {
                        map.setLayoutProperty(
                            LINE_POLYGON_LAYERS[i],
                            "visibility",
                            vis,
                        );
                    }
                });

            document
                .getElementById("toggle-pois")
                .addEventListener("change", function (e) {
                    var vis = e.target.checked ? "visible" : "none";
                    map.setLayoutProperty("poi-circle", "visibility", vis);
                });

            document
                .getElementById("toggle-transit-routes")
                .addEventListener("change", function (e) {
                    var vis = e.target.checked ? "visible" : "none";
                    map.setLayoutProperty(
                        "transit-routes-line",
                        "visibility",
                        vis,
                    );
                });

            document
                .getElementById("toggle-transit-stations")
                .addEventListener("change", function (e) {
                    var vis = e.target.checked ? "visible" : "none";
                    for (var i = 0; i < 6; i++) {
                        map.setLayoutProperty(
                            "transit-stations-ring-" + i,
                            "visibility",
                            vis,
                        );
                    }
                });

            // ── Station hover popup ─────────────────────────────────────
            function truncateList(str, max) {
                if (!str) return "";
                var items = str.split(", ");
                if (items.length <= max) return str;
                return (
                    items.slice(0, max).join(", ") +
                    " +" +
                    (items.length - max) +
                    " more"
                );
            }

            map.on("mouseenter", "transit-stations-ring-0", function (e) {
                map.getCanvas().style.cursor = "pointer";
                var p = e.features[0].properties;
                var html = "<strong>" + p.name + "</strong>";
                if (p.operators)
                    html += "<br><em>" + truncateList(p.operators, 3) + "</em>";
                if (p.routeNames)
                    html +=
                        '<br><span style="color:#666">' +
                        truncateList(p.routeNames, 4) +
                        "</span>";
                html +=
                    '<br><span style="color:#999;font-size:11px">Ring ' +
                    (p.ringIndex + 1) +
                    "/" +
                    p.ringCount +
                    "</span>";
                POPUP.setLngLat(e.lngLat).setHTML(html).addTo(map);
            });

            map.on("mouseleave", "transit-stations-ring-0", function () {
                map.getCanvas().style.cursor = "";
                POPUP.remove();
            });

            // ── Pack mode ──────────────────────────────────────────────
            function makeSectionLabel(text) {
                var div = document.createElement("div");
                div.style.fontWeight = "600";
                div.style.marginBottom = "2px";
                div.style.fontSize = "11px";
                div.textContent = text;
                return div;
            }

            function makeToggle(label, colorStyle, onChange) {
                var labelEl = document.createElement("label");
                labelEl.style.cssText =
                    "display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;";
                var cb = document.createElement("input");
                cb.type = "checkbox";
                cb.addEventListener("change", onChange);
                labelEl.appendChild(cb);
                if (colorStyle) {
                    var swatch = document.createElement("span");
                    swatch.className =
                        "legend-swatch" +
                        (colorStyle.polygon ? " polygon" : "");
                    swatch.style.cssText = colorStyle.polygon
                        ? "background:" +
                          colorStyle.fill +
                          ";border:1.5px solid " +
                          colorStyle.line +
                          ";display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:6px;vertical-align:middle;"
                        : "background:" +
                          colorStyle.line +
                          ";display:inline-block;width:20px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle;";
                    labelEl.insertBefore(swatch, cb.nextSibling);
                }
                labelEl.appendChild(document.createTextNode(label));
                return labelEl;
            }

            function createPoiToggle(category) {
                var color = POI_COLORS[category] || "#9ca3af";
                return makeToggle(
                    category,
                    { polygon: true, fill: color, line: color },
                    function (e) {
                        var sourceId = "pack-poi-" + category;
                        var layerId = "pack-poi-circle-" + category;
                        if (
                            e.target.checked &&
                            !PACK_STATE.loadedLayers[sourceId]
                        ) {
                            PACK_STATE.loadedLayers[sourceId] = "loading";
                            fetchJson(
                                "/api/pack/" +
                                    PACK_STATE.regionId +
                                    "/poi/" +
                                    category,
                            )
                                .then(function (data) {
                                    addSource(sourceId, data);
                                    map.addLayer({
                                        id: layerId,
                                        type: "circle",
                                        source: sourceId,
                                        paint: {
                                            "circle-radius": [
                                                "interpolate",
                                                ["linear"],
                                                ["zoom"],
                                                6,
                                                1.5,
                                                10,
                                                3,
                                                14,
                                                7,
                                            ],
                                            "circle-color": color,
                                            "circle-opacity": 0.7,
                                            "circle-stroke-width": 0.5,
                                            "circle-stroke-color": "#fff",
                                        },
                                    });
                                    PACK_STATE.loadedLayers[sourceId] = true;
                                })
                                .catch(function (err) {
                                    console.error(
                                        "Failed to load " + category,
                                        err,
                                    );
                                    PACK_STATE.loadedLayers[sourceId] = false;
                                    e.target.checked = false;
                                });
                        } else if (!e.target.checked) {
                            if (map.getLayer(layerId)) map.removeLayer(layerId);
                            if (map.getSource(sourceId))
                                map.removeSource(sourceId);
                            delete PACK_STATE.loadedLayers[sourceId];
                        }
                    },
                );
            }

            function createMeasuringToggle(category) {
                var colorMap = {
                    coastline: { line: "#2563eb" },
                    "high-speed-rail": { line: "#dc2626" },
                    "body-of-water": { line: "#38bdf8" },
                    "admin-1st-border": { line: "#ea580c" },
                    "admin-2nd-border": { line: "#6b7280" },
                    "admin-boundaries": { line: "#8b5cf6" },
                };
                var cs = colorMap[category] || { line: "#9ca3af" };
                return makeToggle(category, { line: cs.line }, function (e) {
                    var sourceId = "pack-measuring-" + category;
                    if (
                        e.target.checked &&
                        !PACK_STATE.loadedLayers[sourceId]
                    ) {
                        PACK_STATE.loadedLayers[sourceId] = "loading";
                        fetchJson(
                            "/api/pack/" +
                                PACK_STATE.regionId +
                                "/measuring/" +
                                category,
                        )
                            .then(function (data) {
                                addSource(sourceId, data);
                                var layerConfigs = LAYER_CONFIGS[category];
                                if (layerConfigs) {
                                    addLayers(sourceId, layerConfigs);
                                } else {
                                    // Fallback: draw as lines
                                    map.addLayer({
                                        id: "pack-measuring-line-" + category,
                                        type: "line",
                                        source: sourceId,
                                        paint: {
                                            "line-color": cs.line,
                                            "line-width": 2,
                                        },
                                    });
                                }
                                PACK_STATE.loadedLayers[sourceId] = true;
                            })
                            .catch(function (err) {
                                console.error(
                                    "Failed to load measuring " + category,
                                    err,
                                );
                                PACK_STATE.loadedLayers[sourceId] = false;
                                e.target.checked = false;
                            });
                    } else if (!e.target.checked) {
                        removeSourceAndLayers(sourceId);
                        delete PACK_STATE.loadedLayers[sourceId];
                    }
                });
            }

            function createBoundaryToggle(level) {
                var colors = BOUNDARY_COLORS[level] || {
                    fill: "rgba(156, 163, 175, 0.12)",
                    line: "#9ca3af",
                };
                return makeToggle(
                    "Admin level " + level,
                    { polygon: true, fill: colors.fill, line: colors.line },
                    function (e) {
                        var sourceId = "pack-boundaries-" + level;
                        var fillLayerId = "pack-boundaries-fill-" + level;
                        var lineLayerId = "pack-boundaries-line-" + level;
                        if (
                            e.target.checked &&
                            !PACK_STATE.loadedLayers[sourceId]
                        ) {
                            PACK_STATE.loadedLayers[sourceId] = "loading";
                            fetchJson(
                                "/api/pack/" +
                                    PACK_STATE.regionId +
                                    "/boundaries/" +
                                    level,
                            )
                                .then(function (data) {
                                    addSource(sourceId, data);
                                    map.addLayer({
                                        id: fillLayerId,
                                        type: "fill",
                                        source: sourceId,
                                        paint: {
                                            "fill-color": colors.line,
                                            "fill-opacity": 0.1,
                                        },
                                    });
                                    map.addLayer({
                                        id: lineLayerId,
                                        type: "line",
                                        source: sourceId,
                                        paint: {
                                            "line-color": colors.line,
                                            "line-width": 2,
                                            "line-opacity": 0.7,
                                        },
                                    });
                                    PACK_STATE.loadedLayers[sourceId] = true;
                                })
                                .catch(function (err) {
                                    console.error(
                                        "Failed to load boundary level " +
                                            level,
                                        err,
                                    );
                                    PACK_STATE.loadedLayers[sourceId] = false;
                                    e.target.checked = false;
                                });
                        } else if (!e.target.checked) {
                            removeSourceAndLayers(sourceId);
                            delete PACK_STATE.loadedLayers[sourceId];
                        }
                    },
                );
            }

            function clearAllPackLayers() {
                var keys = Object.keys(PACK_STATE.loadedLayers);
                for (var i = 0; i < keys.length; i++) {
                    removeSourceAndLayers(keys[i]);
                }
                PACK_STATE.loadedLayers = {};
            }

            function switchPack(regionId) {
                clearAllPackLayers();
                PACK_STATE.regionId = regionId;
                if (!regionId) {
                    document.getElementById("pack-section").style.display =
                        "none";
                    return;
                }

                var infoEl = document.getElementById("pack-meta-info");
                infoEl.textContent = "Loading meta...";

                fetchJson("/api/pack/" + regionId + "/meta")
                    .then(function (meta) {
                        PACK_STATE.meta = meta;
                        var label = meta.label || regionId;
                        infoEl.textContent =
                            label + " (" + meta.regionPath.join(" / ") + ")";
                        if (meta.bbox) {
                            map.fitBounds(meta.bbox, { padding: 40 });
                        }

                        rebuildPackPanels(meta);
                    })
                    .catch(function (err) {
                        console.error(
                            "Failed to load meta for " + regionId,
                            err,
                        );
                        infoEl.textContent = "Error loading meta";
                    });
            }

            function rebuildPackPanels(meta) {
                // POI categories
                var poiSection = document.getElementById("pack-poi-section");
                poiSection.innerHTML = "";
                var matchingCats = meta.categories && meta.categories.matching;
                if (matchingCats && matchingCats.length > 0) {
                    poiSection.appendChild(makeSectionLabel("Matching (POI)"));
                    for (var i = 0; i < matchingCats.length; i++) {
                        poiSection.appendChild(
                            createPoiToggle(matchingCats[i]),
                        );
                    }
                }

                // Measuring categories
                var measSection = document.getElementById(
                    "pack-measuring-section",
                );
                measSection.innerHTML = "";
                var measCats = meta.categories && meta.categories.measuring;
                if (measCats && measCats.length > 0) {
                    measSection.appendChild(makeSectionLabel("Measuring"));
                    for (var i = 0; i < measCats.length; i++) {
                        measSection.appendChild(
                            createMeasuringToggle(measCats[i]),
                        );
                    }
                }

                // Boundaries
                var bndSection = document.getElementById(
                    "pack-boundaries-section",
                );
                bndSection.innerHTML = "";
                var bndLevels = meta.adminLevels && meta.adminLevels.extract;
                if (bndLevels && bndLevels.length > 0) {
                    bndSection.appendChild(makeSectionLabel("Boundaries"));
                    for (var i = 0; i < bndLevels.length; i++) {
                        bndSection.appendChild(
                            createBoundaryToggle(bndLevels[i]),
                        );
                    }
                }

                // Transit
                var trnSection = document.getElementById(
                    "pack-transit-section",
                );
                trnSection.innerHTML = "";
                trnSection.appendChild(makeSectionLabel("Transit"));
                trnSection.appendChild(
                    makeToggle(
                        "Route lines",
                        {
                            line: "linear-gradient(90deg, #009bbf, #c9242f, #b1cb39)",
                        },
                        function (e) {
                            var sourceId = "pack-transit-routes";
                            if (
                                e.target.checked &&
                                !PACK_STATE.loadedLayers[sourceId]
                            ) {
                                PACK_STATE.loadedLayers[sourceId] = "loading";
                                fetchJson(
                                    "/api/pack/" +
                                        PACK_STATE.regionId +
                                        "/transit/routes",
                                )
                                    .then(function (data) {
                                        addSource(sourceId, data);
                                        map.addLayer({
                                            id: "pack-transit-routes-line",
                                            type: "line",
                                            source: sourceId,
                                            layout: {
                                                visibility: "visible",
                                                "line-cap": "round",
                                                "line-join": "round",
                                            },
                                            paint: {
                                                "line-color": [
                                                    "to-color",
                                                    ["get", "color"],
                                                    "#888",
                                                ],
                                                "line-width": [
                                                    "interpolate",
                                                    ["linear"],
                                                    ["zoom"],
                                                    6,
                                                    1,
                                                    10,
                                                    2,
                                                    13,
                                                    4,
                                                    16,
                                                    7,
                                                ],
                                                "line-opacity": 0.9,
                                            },
                                        });
                                        PACK_STATE.loadedLayers[sourceId] =
                                            true;
                                    })
                                    .catch(function (err) {
                                        console.error(
                                            "Failed to load transit routes",
                                            err,
                                        );
                                        PACK_STATE.loadedLayers[sourceId] =
                                            false;
                                        e.target.checked = false;
                                    });
                            } else if (!e.target.checked) {
                                removeSourceAndLayers(sourceId);
                                delete PACK_STATE.loadedLayers[sourceId];
                            }
                        },
                    ),
                );
                trnSection.appendChild(
                    makeToggle(
                        "Stations",
                        { polygon: true, fill: "#1f6f78", line: "#fff" },
                        function (e) {
                            var sourceId = "pack-transit-stations";
                            if (
                                e.target.checked &&
                                !PACK_STATE.loadedLayers[sourceId]
                            ) {
                                PACK_STATE.loadedLayers[sourceId] = "loading";
                                fetchJson(
                                    "/api/pack/" +
                                        PACK_STATE.regionId +
                                        "/transit/stations",
                                )
                                    .then(function (data) {
                                        addSource(sourceId, data);
                                        for (var ri = 0; ri < 6; ri++) {
                                            map.addLayer({
                                                id:
                                                    "pack-transit-stations-ring-" +
                                                    ri,
                                                type: "circle",
                                                source: sourceId,
                                                filter: [
                                                    "==",
                                                    ["get", "ringIndex"],
                                                    ri,
                                                ],
                                                paint: {
                                                    "circle-color": [
                                                        "to-color",
                                                        ["get", "color"],
                                                        "#888",
                                                    ],
                                                    "circle-opacity": 0.95,
                                                    "circle-radius":
                                                        5 + (5 - ri) * 3,
                                                    "circle-stroke-color":
                                                        "#fff",
                                                    "circle-stroke-width": 1.5,
                                                },
                                            });
                                        }
                                        PACK_STATE.loadedLayers[sourceId] =
                                            true;
                                    })
                                    .catch(function (err) {
                                        console.error(
                                            "Failed to load transit stations",
                                            err,
                                        );
                                        PACK_STATE.loadedLayers[sourceId] =
                                            false;
                                        e.target.checked = false;
                                    });
                            } else if (!e.target.checked) {
                                removeSourceAndLayers(sourceId);
                                delete PACK_STATE.loadedLayers[sourceId];
                            }
                        },
                    ),
                );

                // Add station hover for pack transit stations
                map.on(
                    "mouseenter",
                    "pack-transit-stations-ring-0",
                    function (e) {
                        map.getCanvas().style.cursor = "pointer";
                        var p = e.features[0].properties;
                        var html = "<strong>" + p.name + "</strong>";
                        if (p.operators)
                            html +=
                                "<br><em>" +
                                truncateList(p.operators, 3) +
                                "</em>";
                        if (p.routeNames)
                            html +=
                                '<br><span style="color:#666">' +
                                truncateList(p.routeNames, 4) +
                                "</span>";
                        html +=
                            '<br><span style="color:#999;font-size:11px">Ring ' +
                            (p.ringIndex + 1) +
                            "/" +
                            p.ringCount +
                            "</span>";
                        POPUP.setLngLat(e.lngLat).setHTML(html).addTo(map);
                    },
                );

                map.on(
                    "mouseleave",
                    "pack-transit-stations-ring-0",
                    function () {
                        map.getCanvas().style.cursor = "";
                        POPUP.remove();
                    },
                );
            }

            async function initPackMode() {
                try {
                    var regions = await fetchJson("/api/pack/regions");
                    if (!regions || regions.length === 0) return;

                    var section = document.getElementById("pack-section");
                    section.style.display = "block";

                    var select = document.getElementById("pack-select");
                    var blankOpt = document.createElement("option");
                    blankOpt.value = "";
                    blankOpt.textContent = "-- Select pack --";
                    select.appendChild(blankOpt);

                    for (var i = 0; i < regions.length; i++) {
                        var opt = document.createElement("option");
                        opt.value = regions[i];
                        opt.textContent = regions[i];
                        select.appendChild(opt);
                    }

                    select.addEventListener("change", function () {
                        switchPack(this.value);
                    });
                } catch (err) {
                    console.log("No packs available:", err.message);
                }
            }
        </script>
    </body>
</html>
